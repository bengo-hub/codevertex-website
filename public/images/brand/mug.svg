<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 540" width="520" height="540">
  <defs>
    <linearGradient id="mbg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#2d0040"/>
      <stop offset="30%"  stop-color="#9100B0"/>
      <stop offset="68%"  stop-color="#9500b5"/>
      <stop offset="100%" stop-color="#2d0040"/>
    </linearGradient>
    <linearGradient id="mrim" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d8b0e8"/><stop offset="100%" stop-color="#b080c8"/>
    </linearGradient>
    <linearGradient id="mbot" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2d0040"/><stop offset="100%" stop-color="#100018"/>
    </linearGradient>
    <linearGradient id="mhdl" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1e0030"/><stop offset="50%" stop-color="#9100B0"/><stop offset="100%" stop-color="#1e0030"/>
    </linearGradient>
    <linearGradient id="mliq" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d0a0e0" stop-opacity="0.9"/><stop offset="100%" stop-color="#906090" stop-opacity="0.7"/>
    </linearGradient>
  </defs>

  <!-- Shadow -->
  <ellipse cx="240" cy="524" rx="152" ry="10" fill="#0a0008" opacity="0.16"/>

  <!-- Handle -->
  <path d="M362,192 Q452,192 452,275 Q452,358 362,358"
    fill="none" stroke="url(#mhdl)" stroke-width="30" stroke-linecap="round"/>
  <path d="M362,192 Q434,192 434,275 Q434,358 362,358"
    fill="none" stroke="#b050c8" stroke-width="10" stroke-linecap="round" opacity="0.25"/>

  <!-- Mug body -->
  <path d="M60,122 L88,494 Q90,510 110,510 L374,510 Q394,510 396,494 L424,122 Z" fill="url(#mbg)"/>

  <!-- Rim ellipse -->
  <ellipse cx="242" cy="122" rx="182" ry="30" fill="url(#mrim)"/>

  <!-- Liquid surface -->
  <ellipse cx="242" cy="122" rx="164" ry="21" fill="url(#mliq)"/>

  <!-- Bottom ellipse -->
  <ellipse cx="242" cy="510" rx="138" ry="14" fill="url(#mbot)"/>

  <!-- Side highlight -->
  <path d="M80,148 L102,488" stroke="#c060d8" stroke-width="9" stroke-linecap="round" opacity="0.3"/>

  <!-- Logo: scale 0.30 at mug face centre (242, 300). -->
  <g transform="translate(242,300) scale(0.30)">
    <text x="-393" y="45"
      font-family="'Poppins','Arial Black',sans-serif"
      font-weight="800" font-size="128" fill="#ffffff">Code</text>
    <circle cx="0" cy="0" r="45" stroke="#ffffff" stroke-width="8" fill="none"/>
    <polyline points="-19,3 -6,19 21,-19"
      stroke="#ffffff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <text x="48" y="45"
      font-family="'Poppins','Arial Black',sans-serif"
      font-weight="800" font-size="128" fill="#ffffff">ertex</text>
    <text x="-220" y="73" text-anchor="middle"
      font-family="'Poppins',Arial,sans-serif"
      font-weight="500" font-size="19" fill="#f0c8f8" letter-spacing="4">AFRICA</text>
    <text x="224" y="73" text-anchor="middle"
      font-family="'Poppins',Arial,sans-serif"
      font-weight="500" font-size="19" fill="#f0c8f8" letter-spacing="4">LIMITED</text>
  </g>

  <text x="242" y="480" text-anchor="middle"
    font-family="'Arial',sans-serif" font-size="9" fill="#d090e8" letter-spacing="0.8">
    codevertexitsolutions.com
  </text>
</svg>
