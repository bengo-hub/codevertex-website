<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 520" width="500" height="520">
  <defs>
    <linearGradient id="mugBodyGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5a2047"/>
      <stop offset="35%" style="stop-color:#722F5F"/>
      <stop offset="65%" style="stop-color:#7a3568"/>
      <stop offset="100%" style="stop-color:#5a2047"/>
    </linearGradient>
    <linearGradient id="mugTopGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d8b0cc"/>
      <stop offset="100%" style="stop-color:#b88aac"/>
    </linearGradient>
    <linearGradient id="mugBottomGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5a2047"/>
      <stop offset="100%" style="stop-color:#3a1030"/>
    </linearGradient>
    <linearGradient id="handleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5a2047"/>
      <stop offset="50%" style="stop-color:#8a4070"/>
      <stop offset="100%" style="stop-color:#5a2047"/>
    </linearGradient>
    <linearGradient id="liquidGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c8a0b8" stop-opacity="0.9"/>
      <stop offset="100%" style="stop-color:#9a7090" stop-opacity="0.7"/>
    </linearGradient>
    <style>
      .mug-logo {
        font-family: 'Arial Black', Arial, sans-serif;
        font-weight: 900;
        font-size: 36px;
        fill: #ffffff;
        letter-spacing: -1px;
      }
      .mug-tag {
        font-family: 'Arial', sans-serif;
        font-weight: 700;
        font-size: 10px;
        fill: #f0d0e8;
        letter-spacing: 2.5px;
      }
    </style>
  </defs>

  <!-- Mug shadow -->
  <ellipse cx="230" cy="498" rx="145" ry="12" fill="#1a0a14" opacity="0.18"/>

  <!-- Mug handle -->
  <path d="M 350 185 Q 430 185 430 260 Q 430 335 350 335"
    fill="none" stroke="url(#handleGrad)" stroke-width="28" stroke-linecap="round"/>
  <path d="M 350 185 Q 415 185 415 260 Q 415 335 350 335"
    fill="none" stroke="#9a5080" stroke-width="10" stroke-linecap="round" opacity="0.4"/>

  <!-- Mug body -->
  <path d="M 62 118 L 88 470 Q 90 488 108 488 L 358 488 Q 376 488 378 470 L 404 118 Z"
    fill="url(#mugBodyGrad)"/>

  <!-- Rim ellipse top -->
  <ellipse cx="233" cy="118" rx="171" ry="28" fill="url(#mugTopGrad)"/>
  <ellipse cx="233" cy="118" rx="155" ry="20" fill="url(#liquidGrad)"/>

  <!-- Bottom rim -->
  <ellipse cx="233" cy="488" rx="130" ry="14" fill="url(#mugBottomGrad)"/>

  <!-- Highlight stripe on left -->
  <path d="M 82 140 L 102 468" stroke="#a06080" stroke-width="8" stroke-linecap="round" opacity="0.4"/>

  <!-- Logo group on mug body -->
  <!-- "Code" -->
  <text class="mug-logo" x="106" y="294">Code</text>

  <!-- Circle checkmark -->
  <circle cx="280" cy="264" r="26" stroke="#ffffff" stroke-width="3" fill="none"/>
  <polyline points="266,264 277,278 296,248" stroke="#ffffff" stroke-width="3"
    stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- "ertex" -->
  <text class="mug-logo" x="303" y="294">ertex</text>

  <!-- AFRICA LIMITED -->
  <text class="mug-tag" x="222" y="313" text-anchor="end">AFRICA</text>
  <text class="mug-tag" x="338" y="313" text-anchor="start">LIMITED</text>

  <!-- Website text at mug bottom -->
  <text x="233" y="460" text-anchor="middle"
    font-family="'Arial', sans-serif" font-size="9" fill="#d0a0c0" letter-spacing="1">
    codevertexitsolutions.com
  </text>
</svg>
