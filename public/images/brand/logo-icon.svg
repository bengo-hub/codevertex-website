<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Icon-only variant: circle-checkmark symbol for favicon/app icon use -->
  <rect width="120" height="120" rx="24" fill="#9100B0"/>

  <!-- White circle ring -->
  <circle cx="60" cy="60" r="42"
    stroke="#ffffff" stroke-width="7" fill="none"/>

  <!-- White checkmark -->
  <polyline points="38,62 54,78 82,42"
    stroke="#ffffff" stroke-width="8"
    stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
