<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 640" width="700" height="640">
  <defs>
    <linearGradient id="tsg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1e0030"/>
      <stop offset="25%"  stop-color="#9100B0"/>
      <stop offset="60%"  stop-color="#a400cc"/>
      <stop offset="100%" stop-color="#1e0030"/>
    </linearGradient>
  </defs>

  <!-- T-shirt body -->
  <path d="M 168,132 L 82,84 L 8,176 L 108,214 L 108,586 L 592,586 L 592,214 L 692,176 L 618,84 L 532,132
    C 498,174 430,196 350,196 C 270,196 202,174 168,132 Z"
    fill="url(#tsg)" stroke="#3a0048" stroke-width="2"/>

  <!-- Neckline highlight -->
  <path d="M 168,132 C 228,172 284,193 350,196 C 416,193 472,172 532,132"
    fill="none" stroke="#c040e0" stroke-width="1.5" opacity="0.5"/>

  <!-- Sleeve seams -->
  <line x1="82"  y1="84"  x2="108" y2="214" stroke="#3a0048" stroke-width="1" opacity="0.4"/>
  <line x1="618" y1="84"  x2="592" y2="214" stroke="#3a0048" stroke-width="1" opacity="0.4"/>

  <!-- Logo: circle-centred, scale 0.42. Circle centre → (350,370). -->
  <g transform="translate(350,370) scale(0.42)">
    <text x="-393" y="45"
      font-family="'Poppins','Arial Black',sans-serif"
      font-weight="800" font-size="128" fill="#ffffff">Code</text>
    <circle cx="0" cy="0" r="45" stroke="#ffffff" stroke-width="8" fill="none"/>
    <polyline points="-19,3 -6,19 21,-19"
      stroke="#ffffff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <text x="48" y="45"
      font-family="'Poppins','Arial Black',sans-serif"
      font-weight="800" font-size="128" fill="#ffffff">ertex</text>
    <text x="-220" y="73" text-anchor="middle"
      font-family="'Poppins',Arial,sans-serif"
      font-weight="500" font-size="19" fill="#f0c8f8" letter-spacing="4">AFRICA</text>
    <text x="224" y="73" text-anchor="middle"
      font-family="'Poppins',Arial,sans-serif"
      font-weight="500" font-size="19" fill="#f0c8f8" letter-spacing="4">LIMITED</text>
  </g>
</svg>
