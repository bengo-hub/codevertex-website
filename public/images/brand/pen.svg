<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 600" width="200" height="600">
  <defs>
    <linearGradient id="penBodyGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5a2047"/>
      <stop offset="40%" style="stop-color:#722F5F"/>
      <stop offset="70%" style="stop-color:#8a3972"/>
      <stop offset="100%" style="stop-color:#5a2047"/>
    </linearGradient>
    <linearGradient id="penClipGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c0a0b8"/>
      <stop offset="50%" style="stop-color:#e8d0e0"/>
      <stop offset="100%" style="stop-color:#c0a0b8"/>
    </linearGradient>
    <style>
      .pen-logo {
        font-family: 'Arial Black', Arial, sans-serif;
        font-weight: 900;
        font-size: 13px;
        fill: #ffffff;
        letter-spacing: -0.5px;
      }
      .pen-tag {
        font-family: 'Arial', sans-serif;
        font-weight: 700;
        font-size: 5.5px;
        fill: #f0d0e8;
        letter-spacing: 1.5px;
      }
    </style>
  </defs>

  <!-- Pen cap (top) -->
  <rect x="72" y="10" width="56" height="70" rx="8" ry="8" fill="url(#penClipGrad)"/>
  <rect x="80" y="8" width="40" height="10" rx="5" ry="5" fill="#d0b0c8"/>
  <!-- Clip -->
  <rect x="92" y="10" width="8" height="90" rx="3" ry="3" fill="url(#penClipGrad)"/>
  <circle cx="96" cy="100" r="5" fill="#c0a0b8"/>

  <!-- Pen body -->
  <rect x="72" y="78" width="56" height="420" rx="4" ry="4" fill="url(#penBodyGrad)"/>

  <!-- Logo text on pen body — rotated 90° along the pen -->
  <g transform="translate(100, 290) rotate(-90)">
    <!-- "Code" -->
    <text class="pen-logo" x="-120" y="-14">Code</text>
    <!-- Circle checkmark -->
    <circle cx="-14" cy="-24" r="12" stroke="#ffffff" stroke-width="1.5" fill="#722F5F"/>
    <polyline points="-21,-24 -16,-18 -6,-32" stroke="#ffffff" stroke-width="1.5"
      stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- "ertex" -->
    <text class="pen-logo" x="0" y="-14">ertex</text>
    <!-- Tagline -->
    <text class="pen-tag" x="-60" y="-2">AFRICA LIMITED</text>
  </g>

  <!-- Pen grip / rubber section -->
  <rect x="72" y="468" width="56" height="30" rx="3" ry="3" fill="#4a1a3a"/>
  <!-- Grip texture lines -->
  <line x1="72" y1="476" x2="128" y2="476" stroke="#5a2a4a" stroke-width="1" opacity="0.5"/>
  <line x1="72" y1="482" x2="128" y2="482" stroke="#5a2a4a" stroke-width="1" opacity="0.5"/>
  <line x1="72" y1="488" x2="128" y2="488" stroke="#5a2a4a" stroke-width="1" opacity="0.5"/>

  <!-- Pen taper section -->
  <path d="M72,498 L100,570 L128,498 Z" fill="#5a2047"/>
  <!-- Pen tip / nib -->
  <path d="M96,566 L100,585 L104,566 Z" fill="#c0a0b8"/>
  <line x1="100" y1="575" x2="100" y2="590" stroke="#a08898" stroke-width="1.5"/>
</svg>
