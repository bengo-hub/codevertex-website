<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 700" width="240" height="700">
  <defs>
    <linearGradient id="pbg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#1e0030"/>
      <stop offset="30%"  stop-color="#9100B0"/>
      <stop offset="65%"  stop-color="#a400cc"/>
      <stop offset="100%" stop-color="#1e0030"/>
    </linearGradient>
    <linearGradient id="pcap" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#c880d8"/>
      <stop offset="50%"  stop-color="#e8b0f0"/>
      <stop offset="100%" stop-color="#c880d8"/>
    </linearGradient>
  </defs>

  <!-- Cap -->
  <rect x="82" y="14" width="76" height="82" rx="10" fill="url(#pcap)"/>
  <rect x="92" y="10" width="56" height="12" rx="6" fill="#d8a0e8"/>
  <rect x="111" y="14" width="10" height="106" rx="4" fill="url(#pcap)"/>
  <ellipse cx="116" cy="120" rx="7" ry="5" fill="#c070d0"/>

  <!-- Body -->
  <rect x="82" y="90" width="76" height="484" rx="5" fill="url(#pbg)"/>
  <rect x="85" y="100" width="8" height="464" rx="4" fill="#b040c8" opacity="0.3"/>

  <!-- Logo: rotate(-90) so it reads normally when pen is horizontal nib-right.
       Scale 0.32. Circle centre on pen axis at (120, 330). -->
  <g transform="translate(120,330) rotate(-90) scale(0.32)">
    <text x="-393" y="45"
      font-family="'Poppins','Arial Black',sans-serif"
      font-weight="800" font-size="128" fill="#ffffff">Code</text>
    <circle cx="0" cy="0" r="45" stroke="#ffffff" stroke-width="8" fill="none"/>
    <polyline points="-19,3 -6,19 21,-19"
      stroke="#ffffff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <text x="48" y="45"
      font-family="'Poppins','Arial Black',sans-serif"
      font-weight="800" font-size="128" fill="#ffffff">ertex</text>
    <text x="-220" y="73" text-anchor="middle"
      font-family="'Poppins',Arial,sans-serif"
      font-weight="500" font-size="19" fill="#f0c8f8" letter-spacing="4">AFRICA</text>
    <text x="224" y="73" text-anchor="middle"
      font-family="'Poppins',Arial,sans-serif"
      font-weight="500" font-size="19" fill="#f0c8f8" letter-spacing="4">LIMITED</text>
  </g>

  <!-- Grip -->
  <rect x="82" y="548" width="76" height="28" rx="3" fill="#160020"/>
  <line x1="82" y1="557" x2="158" y2="557" stroke="#3a0048" stroke-width="1" opacity="0.7"/>
  <line x1="82" y1="565" x2="158" y2="565" stroke="#3a0048" stroke-width="1" opacity="0.7"/>
  <line x1="82" y1="573" x2="158" y2="573" stroke="#3a0048" stroke-width="1" opacity="0.7"/>

  <!-- Taper + nib -->
  <path d="M82,576 L120,660 L158,576 Z" fill="#2d0040"/>
  <path d="M117,656 L120,678 L123,656 Z" fill="#c880d8"/>
  <line x1="120" y1="666" x2="120" y2="682" stroke="#a870c0" stroke-width="2"/>
</svg>
