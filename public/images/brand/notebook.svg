<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 660" width="540" height="660">
  <defs>
    <linearGradient id="covg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9100B0"/><stop offset="100%" stop-color="#1e0030"/>
    </linearGradient>
    <linearGradient id="spng" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#100018"/><stop offset="100%" stop-color="#2d0040"/>
    </linearGradient>
    <clipPath id="covclip">
      <rect x="72" y="20" width="448" height="622" rx="5"/>
    </clipPath>
  </defs>

  <!-- Shadow -->
  <rect x="84" y="30" width="448" height="622" rx="6" fill="#0a0008" opacity="0.18"/>

  <!-- Spine -->
  <rect x="28" y="20" width="52" height="622" rx="4" fill="url(#spng)"/>

  <!-- Binding rings -->
  <g fill="none" stroke="#d088e8" stroke-width="3.5" stroke-linecap="round">
    <path d="M28,108 Q2,108 2,130 Q2,152 28,152"/>
    <path d="M28,208 Q2,208 2,230 Q2,252 28,252"/>
    <path d="M28,308 Q2,308 2,330 Q2,352 28,352"/>
    <path d="M28,408 Q2,408 2,430 Q2,452 28,452"/>
    <path d="M28,508 Q2,508 2,530 Q2,552 28,552"/>
  </g>

  <!-- Cover -->
  <rect x="72" y="20" width="448" height="622" rx="5" fill="url(#covg)"/>

  <!-- Subtle ruled lines -->
  <g clip-path="url(#covclip)" opacity="0.04" stroke="#ffffff" stroke-width="0.5">
    <line x1="72" y1="80"  x2="520" y2="80"/>
    <line x1="72" y1="140" x2="520" y2="140"/>
    <line x1="72" y1="200" x2="520" y2="200"/>
    <line x1="72" y1="260" x2="520" y2="260"/>
    <line x1="72" y1="320" x2="520" y2="320"/>
    <line x1="72" y1="380" x2="520" y2="380"/>
    <line x1="72" y1="440" x2="520" y2="440"/>
    <line x1="72" y1="500" x2="520" y2="500"/>
    <line x1="72" y1="560" x2="520" y2="560"/>
    <line x1="72" y1="620" x2="520" y2="620"/>
  </g>

  <!-- Top stripe accent -->
  <rect x="72" y="20" width="448" height="6" rx="3" fill="#ea8022" opacity="0.8"/>

  <!-- Logo: scale 0.40 at cover centre (296, 310). -->
  <g transform="translate(296,310) scale(0.40)">
    <text x="-393" y="45"
      font-family="'Poppins','Arial Black',sans-serif"
      font-weight="800" font-size="128" fill="#ffffff">Code</text>
    <circle cx="0" cy="0" r="45" stroke="#ffffff" stroke-width="8" fill="none"/>
    <polyline points="-19,3 -6,19 21,-19"
      stroke="#ffffff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <text x="48" y="45"
      font-family="'Poppins','Arial Black',sans-serif"
      font-weight="800" font-size="128" fill="#ffffff">ertex</text>
    <text x="-220" y="73" text-anchor="middle"
      font-family="'Poppins',Arial,sans-serif"
      font-weight="500" font-size="19" fill="#f0c8f8" letter-spacing="4">AFRICA</text>
    <text x="224" y="73" text-anchor="middle"
      font-family="'Poppins',Arial,sans-serif"
      font-weight="500" font-size="19" fill="#f0c8f8" letter-spacing="4">LIMITED</text>
  </g>

  <text x="296" y="372" text-anchor="middle"
    font-family="'Poppins','Arial',sans-serif" font-size="11" fill="#d090e8" letter-spacing="1">
    Architecting Africa's Digital Renaissance
  </text>
  <text x="296" y="612" text-anchor="middle"
    font-family="'Arial',sans-serif" font-size="10" fill="#b068c8" letter-spacing="0.8">
    www.codevertexitsolutions.com
  </text>
</svg>
