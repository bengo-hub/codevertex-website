<svg viewBox="0 0 560 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1020"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="560" height="280" fill="url(#bg)"/>
  <rect width="560" height="280" fill="url(#glow)"/>

  <text x="280" y="26" fill="#f59e0b" font-family="sans-serif" font-size="12" text-anchor="middle" font-weight="bold">CODING FOR KIDS — SCRATCH &amp; PYTHON</text>

  <!-- Scratch blocks left side -->
  <!-- When flag clicked -->
  <rect x="20" y="40" width="180" height="32" rx="6" fill="#f59e0b"/>
  <rect x="20" y="36" width="20" height="12" rx="4" fill="#f59e0b"/>
  <text x="34" y="44" fill="#7c5100" font-family="sans-serif" font-size="9" font-weight="bold">▶</text>
  <text x="45" y="62" fill="white" font-family="sans-serif" font-size="11" font-weight="bold">when 🏴 clicked</text>

  <!-- Move block -->
  <rect x="20" y="76" width="180" height="32" rx="6" fill="#4c97ff"/>
  <text x="30" y="97" fill="white" font-family="sans-serif" font-size="11" font-weight="bold">move 10 steps</text>

  <!-- Repeat block -->
  <rect x="20" y="112" width="180" height="32" rx="6" fill="#ff8c1a"/>
  <rect x="20" y="108" width="20" height="12" rx="4" fill="#ff8c1a"/>
  <text x="30" y="133" fill="white" font-family="sans-serif" font-size="11" font-weight="bold">repeat 10</text>

  <!-- Say block nested -->
  <rect x="40" y="148" width="160" height="32" rx="6" fill="#9966ff"/>
  <text x="50" y="169" fill="white" font-family="sans-serif" font-size="11" font-weight="bold">say "Hello Kenya!" 2s</text>

  <!-- Play sound -->
  <rect x="20" y="184" width="180" height="32" rx="6" fill="#cf63cf"/>
  <text x="30" y="205" fill="white" font-family="sans-serif" font-size="11" font-weight="bold">play sound "meow" ▶</text>

  <!-- Python section right side -->
  <rect x="220" y="40" width="200" height="180" rx="10" fill="#161b22" stroke="#10B981" stroke-opacity="0.3" stroke-width="1"/>
  <rect x="220" y="40" width="200" height="28" rx="10" fill="#1c2333"/>
  <rect x="220" y="56" width="200" height="12" fill="#1c2333"/>
  <text x="295" y="58" fill="#10B981" font-family="monospace" font-size="9" text-anchor="middle" font-weight="bold">game.py</text>

  <text x="232" y="86" fill="#637777" font-family="monospace" font-size="9"># Create a fun game!</text>
  <text x="232" y="102" fill="#d070e8" font-family="monospace" font-size="9">import</text>
  <text x="272" y="102" fill="#9100B0" font-family="monospace" font-size="9">turtle</text>
  <text x="232" y="118" fill="#d070e8" font-family="monospace" font-size="9">import</text>
  <text x="272" y="118" fill="#9100B0" font-family="monospace" font-size="9">random</text>

  <text x="232" y="136" fill="#82aaff" font-family="monospace" font-size="9">t = turtle.Turtle()</text>
  <text x="232" y="152" fill="#82aaff" font-family="monospace" font-size="9">t.speed(</text>
  <text x="292" y="152" fill="#f97316" font-family="monospace" font-size="9">10</text>
  <text x="302" y="152" fill="#82aaff" font-family="monospace" font-size="9">)</text>

  <text x="232" y="170" fill="#d070e8" font-family="monospace" font-size="9">for</text>
  <text x="254" y="170" fill="#cdd9e5" font-family="monospace" font-size="9">i in range(</text>
  <text x="332" y="170" fill="#f97316" font-family="monospace" font-size="9">100</text>
  <text x="352" y="170" fill="#cdd9e5" font-family="monospace" font-size="9">):</text>
  <text x="232" y="186" fill="#10B981" font-family="monospace" font-size="9">  t.forward(i)</text>
  <text x="232" y="202" fill="#10B981" font-family="monospace" font-size="9">  t.right(91)</text>
  <text x="232" y="214" fill="#637777" font-family="monospace" font-size="9"># Draws spiral! ✨</text>

  <!-- Game sprite area -->
  <rect x="436" y="40" width="106" height="180" rx="10" fill="#0d1117" stroke="#f59e0b" stroke-opacity="0.3" stroke-width="1"/>
  <text x="489" y="60" fill="#f59e0b" font-family="sans-serif" font-size="9" text-anchor="middle" font-weight="bold">GAME STAGE</text>

  <!-- Stars/game elements -->
  <circle cx="460" cy="90" r="6" fill="#f59e0b" opacity="0.8"/>
  <text x="460" y="94" fill="white" font-family="sans-serif" font-size="8" text-anchor="middle">★</text>
  <circle cx="510" cy="80" r="5" fill="#f59e0b" opacity="0.5"/>
  <circle cx="480" cy="110" r="4" fill="#ef4444" opacity="0.7"/>
  <text x="489" y="140" fill="#10B981" font-family="sans-serif" font-size="20" text-anchor="middle">🐱</text>

  <!-- Score -->
  <rect x="446" y="155" width="86" height="22" rx="4" fill="#161b22" stroke="#f59e0b" stroke-opacity="0.3" stroke-width="1"/>
  <text x="489" y="170" fill="#f59e0b" font-family="monospace" font-size="9" text-anchor="middle">Score: 320</text>

  <!-- Platform -->
  <rect x="446" y="185" width="86" height="12" rx="3" fill="#10B981" fill-opacity="0.4"/>
  <text x="489" y="195" fill="#10B981" font-family="monospace" font-size="7" text-anchor="middle">Platform</text>

  <!-- Footer -->
  <rect x="20" y="234" width="522" height="32" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="30" y="248" fill="#f59e0b" font-family="sans-serif" font-size="9" font-weight="bold">Ages 8–13</text>
  <text x="100" y="248" fill="#6e7681" font-family="sans-serif" font-size="9">·</text>
  <text x="112" y="248" fill="#6e7681" font-family="sans-serif" font-size="9">Scratch visual blocks + Python</text>
  <text x="112" y="260" fill="#6e7681" font-family="sans-serif" font-size="9">Build games, animations &amp; stories</text>
  <text x="430" y="248" fill="#10B981" font-family="sans-serif" font-size="9" font-weight="bold">8 Weeks</text>
  <text x="430" y="260" fill="#6e7681" font-family="sans-serif" font-size="9">In-person</text>
</svg>
