  <circle cx="310" cy="92" r="18" fill="#1e3a8a" stroke="#60a5fa" stroke-width="2"/>
  <text x="310" y="97" text-anchor="middle" font-family="monospace" font-size="10" fill="#60a5fa">AP</text>
  <circle cx="78" cy="195" r="18" fill="#1e3a8a" stroke="#22c55e" stroke-width="2"/>
  <text x="78" y="200" text-anchor="middle" font-family="monospace" font-size="10" fill="#22c55e">SRV</text>
  <circle cx="322" cy="195" r="18" fill="#1e3a8a" stroke="#22c55e" stroke-width="2"/>
