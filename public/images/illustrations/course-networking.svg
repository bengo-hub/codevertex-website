  <line x1="235" y1="155" x2="310" y2="190" stroke="#3b82f6" stroke-width="2" stroke-dasharray="6,3"/>
  <line x1="200" y1="165" x2="200" y2="210" stroke="#3b82f6" stroke-width="2" stroke-dasharray="6,3"/>
  <!-- Nodes -->
  <circle cx="200" cy="58" r="18" fill="#1e3a8a" stroke="#60a5fa" stroke-width="2"/>
  <text x="200" y="63" text-anchor="middle" font-family="monospace" font-size="11" fill="#60a5fa">PC</text>
  <circle cx="90" cy="92" r="18" fill="#1e3a8a" stroke="#60a5fa" stroke-width="2"/>
