  <rect x="178" y="128" width="44" height="6" rx="3" fill="#60a5fa"/>
  <rect x="178" y="140" width="30" height="6" rx="3" fill="#3b82f6"/>
  <circle cx="200" cy="156" r="4" fill="#22c55e"/>
