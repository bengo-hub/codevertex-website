<svg viewBox="0 0 560 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#071a10"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.09"/>
      <stop offset="100%" stop-color="#10B981" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="560" height="280" fill="url(#bg)"/>
  <rect width="560" height="280" fill="url(#glow)"/>

  <text x="280" y="26" fill="#8b949e" font-family="sans-serif" font-size="10" font-weight="bold" text-anchor="middle" letter-spacing="2">CI/CD PIPELINE — FROM CODE TO CLOUD</text>

  <!-- Pipeline steps -->
  <!-- Step 1: Code -->
  <rect x="20" y="42" width="80" height="70" rx="8" fill="#161b22" stroke="#10B981" stroke-opacity="0.35" stroke-width="1.5"/>
  <text x="60" y="62" fill="#10B981" font-family="monospace" font-size="18" text-anchor="middle">⌨</text>
  <text x="60" y="82" fill="#e6edf3" font-family="sans-serif" font-size="10" text-anchor="middle" font-weight="bold">Code</text>
  <text x="60" y="96" fill="#6e7681" font-family="sans-serif" font-size="8" text-anchor="middle">git push</text>
  <text x="60" y="106" fill="#6e7681" font-family="sans-serif" font-size="8" text-anchor="middle">origin main</text>

  <!-- Arrow -->
  <line x1="100" y1="77" x2="116" y2="77" stroke="#10B981" stroke-opacity="0.5" stroke-width="2"/>
  <polygon points="116,73 124,77 116,81" fill="#10B981" fill-opacity="0.5"/>

  <!-- Step 2: CI Build -->
  <rect x="124" y="42" width="80" height="70" rx="8" fill="#161b22" stroke="#38bdf8" stroke-opacity="0.35" stroke-width="1.5"/>
  <text x="164" y="62" fill="#38bdf8" font-family="monospace" font-size="18" text-anchor="middle">⚙</text>
  <text x="164" y="82" fill="#e6edf3" font-family="sans-serif" font-size="10" text-anchor="middle" font-weight="bold">Build</text>
  <text x="164" y="96" fill="#6e7681" font-family="sans-serif" font-size="8" text-anchor="middle">GitHub</text>
  <text x="164" y="106" fill="#6e7681" font-family="sans-serif" font-size="8" text-anchor="middle">Actions</text>

  <!-- Arrow -->
  <line x1="204" y1="77" x2="220" y2="77" stroke="#38bdf8" stroke-opacity="0.5" stroke-width="2"/>
  <polygon points="220,73 228,77 220,81" fill="#38bdf8" fill-opacity="0.5"/>

  <!-- Step 3: Test -->
  <rect x="228" y="42" width="80" height="70" rx="8" fill="#161b22" stroke="#f59e0b" stroke-opacity="0.35" stroke-width="1.5"/>
  <text x="268" y="62" fill="#f59e0b" font-family="monospace" font-size="18" text-anchor="middle">✓</text>
  <text x="268" y="82" fill="#e6edf3" font-family="sans-serif" font-size="10" text-anchor="middle" font-weight="bold">Test</text>
  <text x="268" y="96" fill="#6e7681" font-family="sans-serif" font-size="8" text-anchor="middle">Jest · pytest</text>
  <text x="268" y="106" fill="#3fb950" font-family="sans-serif" font-size="8" text-anchor="middle">All pass ✓</text>

  <!-- Arrow -->
  <line x1="308" y1="77" x2="324" y2="77" stroke="#f59e0b" stroke-opacity="0.5" stroke-width="2"/>
  <polygon points="324,73 332,77 324,81" fill="#f59e0b" fill-opacity="0.5"/>

  <!-- Step 4: Docker -->
  <rect x="332" y="42" width="80" height="70" rx="8" fill="#161b22" stroke="#38bdf8" stroke-opacity="0.35" stroke-width="1.5"/>
  <text x="372" y="64" fill="#38bdf8" font-family="sans-serif" font-size="20" text-anchor="middle">🐳</text>
  <text x="372" y="82" fill="#e6edf3" font-family="sans-serif" font-size="10" text-anchor="middle" font-weight="bold">Docker</text>
  <text x="372" y="96" fill="#6e7681" font-family="sans-serif" font-size="8" text-anchor="middle">Build image</text>
  <text x="372" y="106" fill="#6e7681" font-family="sans-serif" font-size="8" text-anchor="middle">Push to ECR</text>

  <!-- Arrow -->
  <line x1="412" y1="77" x2="428" y2="77" stroke="#38bdf8" stroke-opacity="0.5" stroke-width="2"/>
  <polygon points="428,73 436,77 428,81" fill="#38bdf8" fill-opacity="0.5"/>

  <!-- Step 5: K8s Deploy -->
  <rect x="436" y="42" width="104" height="70" rx="8" fill="#161b22" stroke="#8b5cf6" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="488" y="64" fill="#8b5cf6" font-family="sans-serif" font-size="18" text-anchor="middle">☸</text>
  <text x="488" y="82" fill="#e6edf3" font-family="sans-serif" font-size="10" text-anchor="middle" font-weight="bold">Kubernetes</text>
  <text x="488" y="96" fill="#6e7681" font-family="sans-serif" font-size="8" text-anchor="middle">Deploy pods</text>
  <text x="488" y="106" fill="#3fb950" font-family="sans-serif" font-size="8" text-anchor="middle">Live ✓</text>

  <!-- K8s cluster visualization -->
  <rect x="20" y="130" width="520" height="110" rx="8" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="30" y="148" fill="#8b949e" font-family="monospace" font-size="9" font-weight="bold">KUBERNETES CLUSTER</text>
  <text x="460" y="148" fill="#3fb950" font-family="monospace" font-size="9">● Running</text>

  <!-- Pods -->
  <rect x="36" y="156" width="90" height="36" rx="5" fill="#161b22" stroke="#10B981" stroke-opacity="0.4" stroke-width="1"/>
  <text x="81" y="170" fill="#10B981" font-family="monospace" font-size="9" text-anchor="middle" font-weight="bold">api-pod-1</text>
  <text x="81" y="184" fill="#6e7681" font-family="monospace" font-size="8" text-anchor="middle">node.js · 2 CPU</text>

  <rect x="136" y="156" width="90" height="36" rx="5" fill="#161b22" stroke="#10B981" stroke-opacity="0.4" stroke-width="1"/>
  <text x="181" y="170" fill="#10B981" font-family="monospace" font-size="9" text-anchor="middle" font-weight="bold">api-pod-2</text>
  <text x="181" y="184" fill="#6e7681" font-family="monospace" font-size="8" text-anchor="middle">node.js · 2 CPU</text>

  <rect x="236" y="156" width="90" height="36" rx="5" fill="#161b22" stroke="#38bdf8" stroke-opacity="0.4" stroke-width="1"/>
  <text x="281" y="170" fill="#38bdf8" font-family="monospace" font-size="9" text-anchor="middle" font-weight="bold">web-pod-1</text>
  <text x="281" y="184" fill="#6e7681" font-family="monospace" font-size="8" text-anchor="middle">next.js · 1 CPU</text>

  <rect x="336" y="156" width="95" height="36" rx="5" fill="#161b22" stroke="#f59e0b" stroke-opacity="0.4" stroke-width="1"/>
  <text x="383" y="170" fill="#f59e0b" font-family="monospace" font-size="9" text-anchor="middle" font-weight="bold">postgres-db</text>
  <text x="383" y="184" fill="#6e7681" font-family="monospace" font-size="8" text-anchor="middle">PVC · 10GB</text>

  <rect x="441" y="156" width="94" height="36" rx="5" fill="#161b22" stroke="#8b5cf6" stroke-opacity="0.4" stroke-width="1"/>
  <text x="488" y="170" fill="#8b5cf6" font-family="monospace" font-size="9" text-anchor="middle" font-weight="bold">redis-cache</text>
  <text x="488" y="184" fill="#6e7681" font-family="monospace" font-size="8" text-anchor="middle">cluster · 512MB</text>

  <!-- Tech strip -->
  <rect x="20" y="252" width="520" height="22" rx="5" fill="#161b22"/>
  <text x="30" y="266" fill="#6e7681" font-family="monospace" font-size="9">AWS · GCP · Terraform · Nginx · Prometheus · Grafana · Helm · ArgoCD</text>
</svg>
