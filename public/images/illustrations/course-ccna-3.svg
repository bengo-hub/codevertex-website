<svg viewBox="0 0 560 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#071220"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#0EA5E9" stop-opacity="0.09"/>
      <stop offset="100%" stop-color="#0EA5E9" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="560" height="280" fill="url(#bg)"/>
  <rect width="560" height="280" fill="url(#glow)"/>

  <text x="280" y="24" fill="#0EA5E9" font-family="sans-serif" font-size="10" text-anchor="middle" font-weight="bold" letter-spacing="2">CCNA v7 PART 3 — ENTERPRISE NETWORKING &amp; SECURITY</text>

  <!-- Enterprise network topology -->
  <!-- Internet cloud -->
  <ellipse cx="280" cy="60" rx="55" ry="26" fill="#0d1117" stroke="#0EA5E9" stroke-opacity="0.4" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="280" y="64" fill="#0EA5E9" font-family="sans-serif" font-size="12" text-anchor="middle">☁</text>
  <text x="280" y="56" fill="#6e7681" font-family="monospace" font-size="7" text-anchor="middle">INTERNET</text>

  <!-- Firewall -->
  <rect x="240" y="94" width="80" height="24" rx="5" fill="#ef4444" fill-opacity="0.15" stroke="#ef4444" stroke-opacity="0.5" stroke-width="2"/>
  <text x="280" y="110" fill="#ef4444" font-family="monospace" font-size="9" text-anchor="middle" font-weight="bold">🔥 Firewall</text>

  <!-- Line internet to firewall -->
  <line x1="280" y1="86" x2="280" y2="94" stroke="#0EA5E9" stroke-opacity="0.5" stroke-width="2"/>

  <!-- DMZ -->
  <rect x="360" y="100" width="80" height="24" rx="5" fill="#f59e0b" fill-opacity="0.12" stroke="#f59e0b" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="400" y="115" fill="#f59e0b" font-family="monospace" font-size="8.5" text-anchor="middle">DMZ Zone</text>

  <!-- Web Server in DMZ -->
  <rect x="365" y="132" width="70" height="20" rx="4" fill="#f59e0b" fill-opacity="0.1" stroke="#f59e0b" stroke-opacity="0.3" stroke-width="1"/>
  <text x="400" y="146" fill="#f59e0b" font-family="monospace" font-size="8" text-anchor="middle">Web Server</text>

  <!-- Firewall to DMZ -->
  <line x1="320" y1="106" x2="360" y2="112" stroke="#ef4444" stroke-opacity="0.4" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- SD-WAN controller -->
  <rect x="106" y="100" width="85" height="24" rx="5" fill="#8b5cf6" fill-opacity="0.15" stroke="#8b5cf6" stroke-opacity="0.5" stroke-width="1.5"/>
  <text x="148" y="115" fill="#8b5cf6" font-family="monospace" font-size="9" text-anchor="middle" font-weight="bold">SD-WAN</text>

  <!-- Firewall to SD-WAN -->
  <line x1="240" y1="106" x2="191" y2="112" stroke="#8b5cf6" stroke-opacity="0.4" stroke-width="1.5"/>

  <!-- Core router -->
  <rect x="230" y="136" width="100" height="24" rx="5" fill="#0EA5E9" fill-opacity="0.15" stroke="#0EA5E9" stroke-opacity="0.5" stroke-width="2"/>
  <text x="280" y="151" fill="#0EA5E9" font-family="monospace" font-size="9" text-anchor="middle" font-weight="bold">Core Router</text>

  <!-- Firewall to core -->
  <line x1="280" y1="118" x2="280" y2="136" stroke="#0EA5E9" stroke-opacity="0.5" stroke-width="2"/>

  <!-- Distribution switches -->
  <rect x="110" y="178" width="75" height="22" rx="4" fill="#10B981" fill-opacity="0.15" stroke="#10B981" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="147" y="193" fill="#10B981" font-family="monospace" font-size="8.5" text-anchor="middle">Dist-SW-1</text>

  <rect x="375" y="178" width="75" height="22" rx="4" fill="#10B981" fill-opacity="0.15" stroke="#10B981" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="412" y="193" fill="#10B981" font-family="monospace" font-size="8.5" text-anchor="middle">Dist-SW-2</text>

  <!-- Core to distribution -->
  <line x1="247" y1="155" x2="183" y2="178" stroke="#10B981" stroke-opacity="0.4" stroke-width="1.5"/>
  <line x1="313" y1="155" x2="377" y2="178" stroke="#10B981" stroke-opacity="0.4" stroke-width="1.5"/>

  <!-- Access switches and clients -->
  <rect x="52" y="218" width="60" height="18" rx="3" fill="#6e7681" fill-opacity="0.15" stroke="#6e7681" stroke-opacity="0.3" stroke-width="1"/>
  <text x="82" y="231" fill="#6e7681" font-family="monospace" font-size="7" text-anchor="middle">Access-SW</text>
  <rect x="122" y="218" width="60" height="18" rx="3" fill="#6e7681" fill-opacity="0.15" stroke="#6e7681" stroke-opacity="0.3" stroke-width="1"/>
  <text x="152" y="231" fill="#6e7681" font-family="monospace" font-size="7" text-anchor="middle">Access-SW</text>

  <rect x="375" y="218" width="60" height="18" rx="3" fill="#6e7681" fill-opacity="0.15" stroke="#6e7681" stroke-opacity="0.3" stroke-width="1"/>
  <text x="405" y="231" fill="#6e7681" font-family="monospace" font-size="7" text-anchor="middle">Access-SW</text>
  <rect x="445" y="218" width="60" height="18" rx="3" fill="#6e7681" fill-opacity="0.15" stroke="#6e7681" stroke-opacity="0.3" stroke-width="1"/>
  <text x="475" y="231" fill="#6e7681" font-family="monospace" font-size="7" text-anchor="middle">Access-SW</text>

  <line x1="147" y1="200" x2="82" y2="218" stroke="#6e7681" stroke-opacity="0.3" stroke-width="1"/>
  <line x1="147" y1="200" x2="152" y2="218" stroke="#6e7681" stroke-opacity="0.3" stroke-width="1"/>
  <line x1="412" y1="200" x2="405" y2="218" stroke="#6e7681" stroke-opacity="0.3" stroke-width="1"/>
  <line x1="412" y1="200" x2="475" y2="218" stroke="#6e7681" stroke-opacity="0.3" stroke-width="1"/>

  <!-- ACL code snippet -->
  <rect x="200" y="170" width="160" height="68" rx="6" fill="#0d1117" stroke="#ef4444" stroke-opacity="0.25" stroke-width="1"/>
  <text x="210" y="184" fill="#ef4444" font-family="monospace" font-size="8" font-weight="bold">ACL SECURITY</text>
  <text x="210" y="198" fill="#cdd9e5" font-family="monospace" font-size="7.5">ip access-list extended</text>
  <text x="210" y="210" fill="#f59e0b" font-family="monospace" font-size="7.5">  BLOCK-THREATS</text>
  <text x="210" y="222" fill="#cdd9e5" font-family="monospace" font-size="7.5">permit tcp any any</text>
  <text x="210" y="234" fill="#cdd9e5" font-family="monospace" font-size="7.5">  eq 443</text>

  <!-- Python automation badge -->
  <rect x="20" y="160" width="80" height="50" rx="6" fill="#161b22" stroke="#10B981" stroke-opacity="0.3" stroke-width="1"/>
  <text x="60" y="178" fill="#10B981" font-family="sans-serif" font-size="8" text-anchor="middle" font-weight="bold">Python</text>
  <text x="60" y="192" fill="#6e7681" font-family="sans-serif" font-size="7" text-anchor="middle">Automation</text>
  <text x="60" y="206" fill="#6e7681" font-family="sans-serif" font-size="7" text-anchor="middle">NETCONF/YANG</text>

  <!-- Legend -->
  <rect x="20" y="252" width="520" height="22" rx="5" fill="#161b22"/>
  <text x="30" y="266" fill="#6e7681" font-family="sans-serif" font-size="8.5">Multi-area OSPF · SD-WAN · ACLs · QoS · Network Automation · Python · Ansible</text>
</svg>
