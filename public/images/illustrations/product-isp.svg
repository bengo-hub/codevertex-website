<svg viewBox="0 0 400 280" xmlns="http://www.w3.org/2000/svg" fill="none">
  <rect width="400" height="280" rx="16" fill="#0f1117"/>
  <!-- Central router/tower -->
  <rect x="168" y="100" width="64" height="80" rx="8" fill="#141928" stroke="#38bdf8" stroke-width="1.5"/>
  <rect x="178" y="110" width="44" height="6" rx="2" fill="#38bdf8" opacity="0.5"/>
  <rect x="178" y="122" width="44" height="6" rx="2" fill="#38bdf8" opacity="0.3"/>
  <rect x="178" y="134" width="44" height="6" rx="2" fill="#1e2d4e"/>
  <!-- Signal indicator LEDs -->
  <circle cx="180" cy="152" r="3" fill="#4ade80"/>
  <circle cx="190" cy="152" r="3" fill="#4ade80"/>
  <circle cx="200" cy="152" r="3" fill="#f59e0b"/>
  <circle cx="210" cy="152" r="3" fill="#1e2d4e"/>
  <text x="200" y="168" font-family="monospace" font-size="7" fill="#8892b0" text-anchor="middle">CORE</text>
  <text x="200" y="178" font-family="monospace" font-size="8" fill="#38bdf8" text-anchor="middle">99.8%</text>
  <!-- WiFi waves from center -->
  <path d="M 200 100 Q 200 80 200 60" stroke="#38bdf8" stroke-width="1.5" opacity="0.4" stroke-dasharray="3 3"/>
  <path d="M 168 120 Q 140 100 100 90" stroke="#38bdf8" stroke-width="1.5" opacity="0.4" stroke-dasharray="3 3"/>
  <path d="M 232 120 Q 260 100 310 90" stroke="#38bdf8" stroke-width="1.5" opacity="0.4" stroke-dasharray="3 3"/>
  <path d="M 168 160 Q 130 170 90 180" stroke="#38bdf8" stroke-width="1.5" opacity="0.4" stroke-dasharray="3 3"/>
  <path d="M 232 160 Q 270 170 310 180" stroke="#38bdf8" stroke-width="1.5" opacity="0.4" stroke-dasharray="3 3"/>
  <path d="M 200 180 Q 200 205 200 220" stroke="#38bdf8" stroke-width="1.5" opacity="0.4" stroke-dasharray="3 3"/>
  <!-- Subscriber nodes -->
  <!-- Node 1 - Home user -->
  <rect x="60" y="60" width="70" height="42" rx="8" fill="#141928" stroke="#1e2d4e" stroke-width="1"/>
  <text x="95" y="76" font-family="monospace" font-size="7" fill="#8892b0" text-anchor="middle">HOME-001</text>
  <text x="95" y="90" font-family="monospace" font-size="8" fill="#4ade80" text-anchor="middle">10 Mbps ↑</text>
  <!-- Node 2 - Business -->
  <rect x="270" y="60" width="70" height="42" rx="8" fill="#141928" stroke="#1e2d4e" stroke-width="1"/>
  <text x="305" y="76" font-family="monospace" font-size="7" fill="#8892b0" text-anchor="middle">BIZ-042</text>
  <text x="305" y="90" font-family="monospace" font-size="8" fill="#38bdf8" text-anchor="middle">100 Mbps ↑</text>
  <!-- Node 3 - Hotel -->
  <rect x="40" y="160" width="70" height="42" rx="8" fill="#141928" stroke="#1e2d4e" stroke-width="1"/>
  <text x="75" y="176" font-family="monospace" font-size="7" fill="#8892b0" text-anchor="middle">HOTEL-07</text>
  <text x="75" y="190" font-family="monospace" font-size="8" fill="#4ade80" text-anchor="middle">Active</text>
  <!-- Node 4 - Hotspot -->
  <rect x="290" y="160" width="70" height="42" rx="8" fill="#141928" stroke="#1e2d4e" stroke-width="1"/>
  <text x="325" y="176" font-family="monospace" font-size="7" fill="#8892b0" text-anchor="middle">HOTSPOT</text>
  <text x="325" y="190" font-family="monospace" font-size="8" fill="#f59e0b" text-anchor="middle">23 users</text>
  <!-- Node 5 - bottom center (captive portal) -->
  <rect x="155" y="220" width="90" height="42" rx="8" fill="#141928" stroke="#1e2d4e" stroke-width="1"/>
  <text x="200" y="236" font-family="monospace" font-size="7" fill="#8892b0" text-anchor="middle">CAPTIVE PORTAL</text>
  <text x="200" y="250" font-family="monospace" font-size="7" fill="#6c47ff" text-anchor="middle">Login · Voucher</text>
  <!-- Stats panel bottom -->
  <rect x="130" y="20" width="140" height="36" rx="8" fill="#141928" stroke="#1e2d4e" stroke-width="1"/>
  <text x="200" y="34" font-family="monospace" font-size="8" fill="#38bdf8" text-anchor="middle">ISP BILLING SYSTEM</text>
  <text x="200" y="48" font-family="monospace" font-size="7" fill="#8892b0" text-anchor="middle">348 subscribers · Auto-billing ON</text>
</svg>
