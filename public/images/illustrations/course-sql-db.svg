<svg viewBox="0 0 560 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1000"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <radialGradient id="glow" cx="40%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.09"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="560" height="280" fill="url(#bg)"/>
  <rect width="560" height="280" fill="url(#glow)"/>

  <text x="280" y="24" fill="#F59E0B" font-family="sans-serif" font-size="10" text-anchor="middle" font-weight="bold" letter-spacing="2">SQL &amp; DATABASE MANAGEMENT</text>

  <!-- SQL query panel left -->
  <rect x="20" y="36" width="275" height="228" rx="8" fill="#161b22" stroke="#F59E0B" stroke-opacity="0.25" stroke-width="1.5"/>
  <rect x="20" y="36" width="275" height="28" rx="8" fill="#1c2333"/>
  <rect x="20" y="52" width="275" height="12" fill="#1c2333"/>
  <text x="113" y="55" fill="#F59E0B" font-family="monospace" font-size="9" text-anchor="middle">query.sql</text>

  <text x="32" y="80" fill="#637777" font-family="monospace" font-size="9">-- Find top customers by revenue</text>

  <text x="32" y="98" fill="#d070e8" font-family="monospace" font-size="9">SELECT</text>
  <text x="32" y="114" fill="#82aaff" font-family="monospace" font-size="9">  c.name,</text>
  <text x="32" y="128" fill="#82aaff" font-family="monospace" font-size="9">  c.region,</text>
  <text x="32" y="142" fill="#82aaff" font-family="monospace" font-size="9">  SUM(o.amount)</text>
  <text x="32" y="156" fill="#d070e8" font-family="monospace" font-size="9">    AS</text>
  <text x="67" y="156" fill="#10B981" font-family="monospace" font-size="9">total_revenue,</text>
  <text x="32" y="170" fill="#82aaff" font-family="monospace" font-size="9">  COUNT(o.id)</text>
  <text x="32" y="184" fill="#d070e8" font-family="monospace" font-size="9">    AS</text>
  <text x="67" y="184" fill="#10B981" font-family="monospace" font-size="9">order_count</text>

  <text x="32" y="202" fill="#d070e8" font-family="monospace" font-size="9">FROM</text>
  <text x="68" y="202" fill="#82aaff" font-family="monospace" font-size="9">customers c</text>
  <text x="32" y="216" fill="#d070e8" font-family="monospace" font-size="9">JOIN</text>
  <text x="64" y="216" fill="#82aaff" font-family="monospace" font-size="9">orders o</text>
  <text x="64" y="230" fill="#d070e8" font-family="monospace" font-size="9">ON</text>
  <text x="82" y="230" fill="#82aaff" font-family="monospace" font-size="9">c.id = o.customer_id</text>

  <text x="32" y="248" fill="#d070e8" font-family="monospace" font-size="9">GROUP BY</text>
  <text x="86" y="248" fill="#82aaff" font-family="monospace" font-size="9">c.name, c.region</text>
  <text x="32" y="258" fill="#d070e8" font-family="monospace" font-size="9">HAVING</text>
  <text x="80" y="258" fill="#f59e0b" font-family="monospace" font-size="9">total_revenue &gt; 100000</text>

  <!-- ER Diagram right panel -->
  <rect x="311" y="36" width="231" height="228" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="425" y="56" fill="#F59E0B" font-family="sans-serif" font-size="9" text-anchor="middle" font-weight="bold">DATABASE SCHEMA (ER)</text>

  <!-- Customers table -->
  <rect x="322" y="64" width="100" height="80" rx="5" fill="#0d1117" stroke="#F59E0B" stroke-opacity="0.5" stroke-width="1.5"/>
  <rect x="322" y="64" width="100" height="18" rx="5" fill="#F59E0B" fill-opacity="0.15"/>
  <rect x="322" y="76" width="100" height="6" fill="#F59E0B" fill-opacity="0.15"/>
  <text x="372" y="76" fill="#F59E0B" font-family="monospace" font-size="8.5" text-anchor="middle" font-weight="bold">CUSTOMERS</text>
  <text x="332" y="92" fill="#8b949e" font-family="monospace" font-size="7.5">🔑 id (PK)</text>
  <text x="332" y="104" fill="#cdd9e5" font-family="monospace" font-size="7.5">name</text>
  <text x="332" y="116" fill="#cdd9e5" font-family="monospace" font-size="7.5">email</text>
  <text x="332" y="128" fill="#cdd9e5" font-family="monospace" font-size="7.5">region</text>
  <text x="332" y="140" fill="#cdd9e5" font-family="monospace" font-size="7.5">created_at</text>

  <!-- Orders table -->
  <rect x="430" y="64" width="100" height="92" rx="5" fill="#0d1117" stroke="#0EA5E9" stroke-opacity="0.5" stroke-width="1.5"/>
  <rect x="430" y="64" width="100" height="18" rx="5" fill="#0EA5E9" fill-opacity="0.12"/>
  <rect x="430" y="76" width="100" height="6" fill="#0EA5E9" fill-opacity="0.12"/>
  <text x="480" y="76" fill="#0EA5E9" font-family="monospace" font-size="8.5" text-anchor="middle" font-weight="bold">ORDERS</text>
  <text x="440" y="92" fill="#8b949e" font-family="monospace" font-size="7.5">🔑 id (PK)</text>
  <text x="440" y="104" fill="#F59E0B" font-family="monospace" font-size="7.5">🔗 customer_id (FK)</text>
  <text x="440" y="116" fill="#cdd9e5" font-family="monospace" font-size="7.5">amount</text>
  <text x="440" y="128" fill="#cdd9e5" font-family="monospace" font-size="7.5">status</text>
  <text x="440" y="140" fill="#cdd9e5" font-family="monospace" font-size="7.5">ordered_at</text>
  <text x="440" y="152" fill="#cdd9e5" font-family="monospace" font-size="7.5">product_id</text>

  <!-- Products table -->
  <rect x="322" y="168" width="100" height="80" rx="5" fill="#0d1117" stroke="#10B981" stroke-opacity="0.5" stroke-width="1.5"/>
  <rect x="322" y="168" width="100" height="18" rx="5" fill="#10B981" fill-opacity="0.1"/>
  <rect x="322" y="180" width="100" height="6" fill="#10B981" fill-opacity="0.1"/>
  <text x="372" y="180" fill="#10B981" font-family="monospace" font-size="8.5" text-anchor="middle" font-weight="bold">PRODUCTS</text>
  <text x="332" y="196" fill="#8b949e" font-family="monospace" font-size="7.5">🔑 id (PK)</text>
  <text x="332" y="208" fill="#cdd9e5" font-family="monospace" font-size="7.5">name</text>
  <text x="332" y="220" fill="#cdd9e5" font-family="monospace" font-size="7.5">price</text>
  <text x="332" y="232" fill="#cdd9e5" font-family="monospace" font-size="7.5">category</text>
  <text x="332" y="244" fill="#cdd9e5" font-family="monospace" font-size="7.5">stock_qty</text>

  <!-- Relationship lines -->
  <line x1="422" y1="110" x2="430" y2="110" stroke="#F59E0B" stroke-opacity="0.5" stroke-width="1.5"/>
  <text x="426" y="107" fill="#F59E0B" font-family="monospace" font-size="8" text-anchor="middle">1:N</text>

  <line x1="422" y1="192" x2="444" y2="168" stroke="#10B981" stroke-opacity="0.4" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="440" y="178" fill="#10B981" font-family="monospace" font-size="7">FK</text>

  <!-- Result query output -->
  <rect x="322" y="252" width="208" height="10" rx="3" fill="#10B981" fill-opacity="0.1" stroke="#10B981" stroke-opacity="0.3" stroke-width="1"/>
  <text x="426" y="260" fill="#10B981" font-family="monospace" font-size="7.5" text-anchor="middle">PostgreSQL · MySQL · SQLite · pgAdmin · DBeaver</text>
</svg>
