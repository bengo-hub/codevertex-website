<svg viewBox="0 0 560 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1000"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.09"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="560" height="280" fill="url(#bg)"/>
  <rect width="560" height="280" fill="url(#glow)"/>

  <text x="280" y="24" fill="#F59E0B" font-family="sans-serif" font-size="10" text-anchor="middle" font-weight="bold" letter-spacing="2">ADVANCED ANALYTICS &amp; STATISTICS</text>

  <!-- Normal distribution curve (top left) -->
  <rect x="20" y="36" width="250" height="120" rx="8" fill="#161b22" stroke="#F59E0B" stroke-opacity="0.25" stroke-width="1.5"/>
  <text x="35" y="56" fill="#F59E0B" font-family="sans-serif" font-size="9" font-weight="bold">NORMAL DISTRIBUTION</text>

  <!-- Bell curve path -->
  <path d="M 32 148 Q 50 148 60 145 Q 75 140 85 130 Q 100 110 110 95 Q 115 84 125 78 Q 135 74 145 78 Q 155 84 160 95 Q 170 110 185 130 Q 195 140 210 145 Q 220 148 238 148"
        fill="none" stroke="#F59E0B" stroke-width="2"/>
  <!-- Fill area -->
  <path d="M 32 148 Q 50 148 60 145 Q 75 140 85 130 Q 100 110 110 95 Q 115 84 125 78 Q 135 74 145 78 Q 155 84 160 95 Q 170 110 185 130 Q 195 140 210 145 Q 220 148 238 148 Z"
        fill="#F59E0B" fill-opacity="0.06"/>

  <!-- Std deviation marks -->
  <line x1="145" y1="75" x2="145" y2="150" stroke="#10B981" stroke-opacity="0.5" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="147" y="70" fill="#10B981" font-family="monospace" font-size="7">μ</text>
  <line x1="110" y1="92" x2="110" y2="150" stroke="#6e7681" stroke-opacity="0.4" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="95" y="88" fill="#6e7681" font-family="monospace" font-size="7">-1σ</text>
  <line x1="180" y1="92" x2="180" y2="150" stroke="#6e7681" stroke-opacity="0.4" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="182" y="88" fill="#6e7681" font-family="monospace" font-size="7">+1σ</text>

  <line x1="32" y1="150" x2="238" y2="150" stroke="#30363d" stroke-width="1"/>

  <!-- Annotations -->
  <text x="90" y="162" fill="#6e7681" font-family="monospace" font-size="7">68.3%</text>
  <rect x="112" y="158" width="66" height="8" rx="2" fill="#F59E0B" fill-opacity="0.15"/>
  <text x="115" y="165" fill="#F59E0B" font-family="monospace" font-size="7">within 1σ</text>

  <!-- A/B Test panel (top right) -->
  <rect x="286" y="36" width="256" height="120" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="302" y="56" fill="#F59E0B" font-family="sans-serif" font-size="9" font-weight="bold">A/B TEST ANALYSIS</text>

  <!-- Variant A -->
  <rect x="302" y="64" width="110" height="82" rx="5" fill="#10B981" fill-opacity="0.08" stroke="#10B981" stroke-opacity="0.3" stroke-width="1"/>
  <text x="357" y="82" fill="#10B981" font-family="sans-serif" font-size="9" text-anchor="middle" font-weight="bold">Variant A</text>
  <text x="357" y="98" fill="#6e7681" font-family="sans-serif" font-size="7.5" text-anchor="middle">Button: Blue</text>
  <text x="357" y="113" fill="#e6edf3" font-family="sans-serif" font-size="14" text-anchor="middle" font-weight="bold">4.2%</text>
  <text x="357" y="127" fill="#6e7681" font-family="sans-serif" font-size="7.5" text-anchor="middle">conversion</text>
  <text x="357" y="140" fill="#6e7681" font-family="sans-serif" font-size="7" text-anchor="middle">n=5,200</text>

  <!-- Variant B -->
  <rect x="422" y="64" width="110" height="82" rx="5" fill="#F59E0B" fill-opacity="0.08" stroke="#F59E0B" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="477" y="82" fill="#F59E0B" font-family="sans-serif" font-size="9" text-anchor="middle" font-weight="bold">Variant B ✓</text>
  <text x="477" y="98" fill="#6e7681" font-family="sans-serif" font-size="7.5" text-anchor="middle">Button: Green</text>
  <text x="477" y="113" fill="#F59E0B" font-family="sans-serif" font-size="14" text-anchor="middle" font-weight="bold">6.8%</text>
  <text x="477" y="127" fill="#6e7681" font-family="sans-serif" font-size="7.5" text-anchor="middle">conversion</text>
  <text x="477" y="140" fill="#10B981" font-family="sans-serif" font-size="7" text-anchor="middle">p &lt; 0.05 ✓</text>

  <!-- Time series forecast (bottom left) -->
  <rect x="20" y="166" width="250" height="100" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="35" y="184" fill="#F59E0B" font-family="sans-serif" font-size="9" font-weight="bold">TIME SERIES FORECASTING</text>

  <!-- Time series chart -->
  <rect x="30" y="192" width="230" height="64" rx="4" fill="#0d1117"/>
  <!-- Historical line -->
  <polyline points="38,240 55,232 72,238 89,225 106,218 123,222 140,212 157,208"
            fill="none" stroke="#F59E0B" stroke-width="2"/>
  <!-- Forecast line (dashed) -->
  <polyline points="157,208 174,200 191,194 208,186 225,180 242,172 252,168"
            fill="none" stroke="#F59E0B" stroke-width="2" stroke-dasharray="5,3"/>
  <!-- Confidence band -->
  <polygon points="157,208 174,196 191,188 208,178 225,172 242,162 252,158 252,178 242,184 225,192 208,200 191,208 174,216 157,220"
           fill="#F59E0B" fill-opacity="0.08"/>
  <!-- Forecast label -->
  <text x="186" y="258" fill="#6e7681" font-family="monospace" font-size="7">→ Forecast</text>
  <!-- Dividing line -->
  <line x1="157" y1="192" x2="157" y2="252" stroke="#30363d" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="160" y="200" fill="#6e7681" font-family="monospace" font-size="7">Now</text>

  <!-- Regression panel (bottom right) -->
  <rect x="286" y="166" width="256" height="100" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="302" y="184" fill="#F59E0B" font-family="sans-serif" font-size="9" font-weight="bold">REGRESSION MODEL</text>

  <!-- Scatter plot with regression line -->
  <rect x="298" y="192" width="128" height="64" rx="4" fill="#0d1117"/>
  <!-- Scatter points -->
  <circle cx="310" cy="246" r="3" fill="#F59E0B" fill-opacity="0.7"/>
  <circle cx="320" cy="236" r="3" fill="#F59E0B" fill-opacity="0.7"/>
  <circle cx="335" cy="228" r="3" fill="#F59E0B" fill-opacity="0.7"/>
  <circle cx="348" cy="222" r="3" fill="#F59E0B" fill-opacity="0.7"/>
  <circle cx="360" cy="215" r="3" fill="#F59E0B" fill-opacity="0.7"/>
  <circle cx="375" cy="208" r="3" fill="#F59E0B" fill-opacity="0.7"/>
  <circle cx="390" cy="200" r="3" fill="#F59E0B" fill-opacity="0.7"/>
  <circle cx="408" cy="198" r="3" fill="#F59E0B" fill-opacity="0.7"/>
  <!-- Regression line -->
  <line x1="305" y1="250" x2="418" y2="196" stroke="#10B981" stroke-width="1.5"/>
  <text x="338" y="258" fill="#6e7681" font-family="monospace" font-size="7">R² = 0.89</text>

  <!-- Stats output -->
  <rect x="434" y="192" width="102" height="64" rx="4" fill="#0d1117"/>
  <text x="444" y="206" fill="#8b949e" font-family="monospace" font-size="7.5" font-weight="bold">MODEL OUTPUT</text>
  <text x="444" y="220" fill="#10B981" font-family="monospace" font-size="7.5">R²: 0.892</text>
  <text x="444" y="232" fill="#F59E0B" font-family="monospace" font-size="7.5">p-val: 0.002</text>
  <text x="444" y="244" fill="#cdd9e5" font-family="monospace" font-size="7.5">coef: 2.34</text>
  <text x="444" y="256" fill="#6e7681" font-family="monospace" font-size="7">Statsmodels</text>
</svg>
