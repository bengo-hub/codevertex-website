  <text x="74" y="249" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#38bdf8" font-weight="bold">Zero-Touch ISP</text>
  <text x="74" y="259" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#8892b0">Auto provisioning</text>

  <rect x="134" y="240" width="100" height="22" rx="6" fill="#6c47ff10" stroke="#6c47ff30" stroke-width="1"/>
  <text x="184" y="249" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#6c47ff" font-weight="bold">TruLoad IoT</text>
  <text x="184" y="259" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#8892b0">Tamper-proof axle data</text>

  <rect x="244" y="240" width="100" height="22" rx="6" fill="#4ade8010" stroke="#4ade8030" stroke-width="1"/>
  <text x="294" y="249" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#4ade80" font-weight="bold">Camera AI</text>
  <text x="294" y="259" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#8892b0">RTSP plate reading</text>

  <rect x="354" y="240" width="100" height="22" rx="6" fill="#f59e0b10" stroke="#f59e0b30" stroke-width="1"/>
  <text x="404" y="249" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#f59e0b" font-weight="bold">Real-time Sync</text>
  <text x="404" y="259" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#8892b0">Hardware to cloud</text>

  <rect x="454" y="240" width="82" height="22" rx="6" fill="#a855f710" stroke="#a855f730" stroke-width="1"/>
  <text x="495" y="249" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#a855f7" font-weight="bold">Mobile PWA</text>
  <text x="495" y="259" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#8892b0">Field enforcement</text>

  <text x="280" y="276" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#f59e0b" font-weight="bold" letter-spacing="2">NETWORK · HARDWARE · AUTOMATIONS</text>
</svg>
