  <text x="460" y="206" text-anchor="middle" font-family="monospace" font-size="7" fill="#8892b0">Analytics</text>
  <line x1="435" y1="186" x2="312" y2="150" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,3"/>
  <circle cx="375" cy="168" r="4" fill="#f59e0b" opacity="0.7"/>

