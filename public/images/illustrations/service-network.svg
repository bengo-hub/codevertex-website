  <rect x="32" y="104" width="56" height="14" rx="7" fill="#4ade8020" stroke="#4ade8040" stroke-width="1"/>
  <text x="60" y="114" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#4ade80" font-weight="bold">LIVE · 99.9%</text>

