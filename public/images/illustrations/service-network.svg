<svg viewBox="0 0 560 280" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="560" height="280" rx="16" fill="#0f1117"/>
  <!-- Grid -->
  <line x1="0" y1="70" x2="560" y2="70" stroke="#1a1f2e" stroke-width="1"/>
  <line x1="0" y1="140" x2="560" y2="140" stroke="#1a1f2e" stroke-width="1"/>
  <line x1="0" y1="210" x2="560" y2="210" stroke="#1a1f2e" stroke-width="1"/>
  <line x1="140" y1="0" x2="140" y2="280" stroke="#1a1f2e" stroke-width="1"/>
  <line x1="280" y1="0" x2="280" y2="280" stroke="#1a1f2e" stroke-width="1"/>
  <line x1="420" y1="0" x2="420" y2="280" stroke="#1a1f2e" stroke-width="1"/>

  <!-- Central cloud node -->
  <circle cx="280" cy="130" r="36" fill="#1a1f2e" stroke="#f59e0b" stroke-width="2"/>
  <text x="280" y="124" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#f59e0b" font-weight="bold">CLOUD</text>
  <text x="280" y="137" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#8892b0">Core API</text>
  <circle cx="280" cy="130" r="28" fill="none" stroke="#f59e0b20" stroke-width="8"/>

  <!-- IoT weighbridge node (top-left) -->
  <circle cx="100" cy="70" r="28" fill="#1a1f2e" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="100" y="65" text-anchor="middle" font-family="monospace" font-size="8" fill="#38bdf8">IoT</text>
  <text x="100" y="76" text-anchor="middle" font-family="monospace" font-size="7" fill="#8892b0">Sensor</text>
  <line x1="125" y1="85" x2="248" y2="112" stroke="#38bdf8" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- Animated data pulse -->
  <circle cx="175" cy="98" r="4" fill="#38bdf8" opacity="0.7"/>

  <!-- Router node (top) -->
  <circle cx="280" cy="48" r="22" fill="#1a1f2e" stroke="#6c47ff" stroke-width="1.5"/>
  <text x="280" y="43" text-anchor="middle" font-family="monospace" font-size="8" fill="#6c47ff">Router</text>
  <text x="280" y="54" text-anchor="middle" font-family="monospace" font-size="7" fill="#8892b0">MikroTik</text>
  <line x1="280" y1="70" x2="280" y2="94" stroke="#6c47ff" stroke-width="1.5" stroke-dasharray="4,3"/>
  <circle cx="280" cy="80" r="3.5" fill="#6c47ff" opacity="0.7"/>

  <!-- Camera node (top-right) -->
  <circle cx="460" cy="70" r="28" fill="#1a1f2e" stroke="#4ade80" stroke-width="1.5"/>
  <text x="460" y="65" text-anchor="middle" font-family="monospace" font-size="8" fill="#4ade80">Camera</text>
  <text x="460" y="76" text-anchor="middle" font-family="monospace" font-size="7" fill="#8892b0">RTSP</text>
  <line x1="435" y1="85" x2="312" y2="112" stroke="#4ade80" stroke-width="1.5" stroke-dasharray="4,3"/>
  <circle cx="375" cy="98" r="4" fill="#4ade80" opacity="0.7"/>

  <!-- Mobile tablet node (bottom-left) -->
  <circle cx="100" cy="200" r="28" fill="#1a1f2e" stroke="#a855f7" stroke-width="1.5"/>
  <text x="100" y="195" text-anchor="middle" font-family="monospace" font-size="8" fill="#a855f7">Mobile</text>
  <text x="100" y="206" text-anchor="middle" font-family="monospace" font-size="7" fill="#8892b0">Tablet</text>
  <line x1="125" y1="186" x2="248" y2="150" stroke="#a855f7" stroke-width="1.5" stroke-dasharray="4,3"/>
  <circle cx="185" cy="168" r="4" fill="#a855f7" opacity="0.7"/>

  <!-- ISP subscribers (bottom) -->
  <circle cx="280" cy="218" r="22" fill="#1a1f2e" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="280" y="213" text-anchor="middle" font-family="monospace" font-size="7" fill="#38bdf8">Subscriber</text>
  <text x="280" y="224" text-anchor="middle" font-family="monospace" font-size="7" fill="#8892b0">Portal</text>
  <line x1="280" y1="196" x2="280" y2="166" stroke="#38bdf8" stroke-width="1.5" stroke-dasharray="4,3"/>
  <circle cx="280" cy="182" r="3.5" fill="#38bdf8" opacity="0.7"/>

