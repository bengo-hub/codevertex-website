<svg viewBox="0 0 400 280" xmlns="http://www.w3.org/2000/svg" fill="none">
  <rect width="400" height="280" rx="16" fill="#0a0e1a"/>

  <!-- ── QUADRANT GRID ── -->
  <line x1="200" y1="0" x2="200" y2="280" stroke="#1e2d4e" stroke-width="1"/>
  <line x1="0" y1="140" x2="400" y2="140" stroke="#1e2d4e" stroke-width="1"/>

  <!-- ═══════════════════════════════════════════════ -->
  <!--  TOP-LEFT: Mobile Portable Axle Scale          -->
  <!-- ═══════════════════════════════════════════════ -->
  <rect x="0" y="0" width="200" height="140" rx="0" fill="#0d1220"/>
  <!-- Ground -->
  <rect x="10" y="110" width="180" height="8" rx="2" fill="#1a2038"/>
  <!-- Portable pad scale (flat, like PAW/Haenni) -->
  <rect x="40" y="100" width="120" height="12" rx="3" fill="#253168" stroke="#38bdf8" stroke-width="1"/>
  <rect x="55" y="103" width="30" height="6" rx="1" fill="#38bdf8" opacity="0.3"/>
  <rect x="115" y="103" width="30" height="6" rx="1" fill="#38bdf8" opacity="0.3"/>
  <!-- Red/yellow pad markings -->
  <rect x="40" y="100" width="4" height="12" rx="1" fill="#ef4444"/>
  <rect x="156" y="100" width="4" height="12" rx="1" fill="#ef4444"/>
  <!-- Truck outline (side profile) -->
  <rect x="50" y="68" width="110" height="34" rx="4" fill="#1e2d5e" stroke="#253168" stroke-width="1"/>
  <rect x="130" y="58" width="50" height="44" rx="5" fill="#253168" stroke="#38bdf8" stroke-width="0.8"/>
  <!-- Cabin window -->
  <rect x="138" y="63" width="36" height="22" rx="3" fill="#38bdf8" opacity="0.25"/>
  <!-- Wheels on scale -->
  <circle cx="80" cy="106" r="9" fill="#111420" stroke="#38bdf8" stroke-width="1.5"/>
  <circle cx="80" cy="106" r="5" fill="#1e2540"/>
  <circle cx="140" cy="106" r="9" fill="#111420" stroke="#38bdf8" stroke-width="1.5"/>
  <circle cx="140" cy="106" r="5" fill="#1e2540"/>
  <!-- Weight display -->
  <rect x="12" y="18" width="80" height="44" rx="6" fill="#141928" stroke="#1e2d4e" stroke-width="1"/>
  <text x="52" y="32" font-family="monospace" font-size="6" fill="#38bdf8" text-anchor="middle">MOBILE AXLE</text>
  <text x="52" y="46" font-family="monospace" font-size="11" font-weight="bold" fill="#4ade80" text-anchor="middle">8.4 t</text>
  <text x="52" y="58" font-family="monospace" font-size="5" fill="#4ade80" text-anchor="middle">STABLE</text>
  <!-- IoT signal -->
  <path d="M 105 28 Q 112 22 119 28" stroke="#38bdf8" stroke-width="1.2" opacity="0.5"/>
  <path d="M 102 24 Q 112 15 122 24" stroke="#38bdf8" stroke-width="1.2" opacity="0.3"/>
  <circle cx="112" cy="30" r="2" fill="#38bdf8"/>
  <!-- Label -->
  <text x="100" y="128" font-family="sans-serif" font-size="7" font-weight="bold" fill="#38bdf8" text-anchor="middle">MOBILE SCALE</text>
  <text x="100" y="137" font-family="sans-serif" font-size="5" fill="#8892b0" text-anchor="middle">PAW / Haenni · Axle-by-Axle</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!--  TOP-RIGHT: Multideck Static Weighbridge       -->
  <!-- ═══════════════════════════════════════════════ -->
  <rect x="200" y="0" width="200" height="140" fill="#0d1220"/>
  <!-- Weighbridge platform -->
  <rect x="210" y="100" width="180" height="14" rx="3" fill="#1e2d5e" stroke="#9100B0" stroke-width="1.5"/>
  <!-- Deck divisions (multideck) -->
  <line x1="270" y1="100" x2="270" y2="114" stroke="#9100B0" stroke-width="1" stroke-dasharray="2 2"/>
  <line x1="330" y1="100" x2="330" y2="114" stroke="#9100B0" stroke-width="1" stroke-dasharray="2 2"/>
  <text x="240" y="110" font-family="monospace" font-size="5" fill="#9100B0" text-anchor="middle">D1</text>
  <text x="300" y="110" font-family="monospace" font-size="5" fill="#9100B0" text-anchor="middle">D2</text>
  <text x="360" y="110" font-family="monospace" font-size="5" fill="#9100B0" text-anchor="middle">D3</text>
  <!-- Big truck on weighbridge -->
  <rect x="220" y="65" width="140" height="38" rx="4" fill="#1e2d5e" stroke="#253168" stroke-width="1"/>
  <rect x="338" y="56" width="50" height="47" rx="5" fill="#253168" stroke="#9100B0" stroke-width="0.8"/>
  <rect x="344" y="62" width="36" height="24" rx="3" fill="#9100B0" opacity="0.2"/>
  <!-- Truck wheels on each deck -->
  <circle cx="245" cy="107" r="8" fill="#111420" stroke="#9100B0" stroke-width="1.5"/>
  <circle cx="245" cy="107" r="4" fill="#1e2540"/>
  <circle cx="300" cy="107" r="8" fill="#111420" stroke="#9100B0" stroke-width="1.5"/>
  <circle cx="300" cy="107" r="4" fill="#1e2540"/>
  <circle cx="355" cy="107" r="8" fill="#111420" stroke="#9100B0" stroke-width="1.5"/>
  <circle cx="355" cy="107" r="4" fill="#1e2540"/>
  <!-- Dashboard panel -->
  <rect x="208" y="14" width="90" height="52" rx="6" fill="#141928" stroke="#1e2d4e" stroke-width="1"/>
  <text x="253" y="28" font-family="monospace" font-size="6" fill="#9100B0" text-anchor="middle">MULTIDECK</text>
  <rect x="218" y="32" width="70" height="1" fill="#1e2d4e"/>
  <text x="218" y="44" font-family="monospace" font-size="5" fill="#8892b0">Deck 1</text>
  <text x="278" y="44" font-family="monospace" font-size="6" fill="#4ade80" text-anchor="end">9.1t</text>
  <text x="218" y="55" font-family="monospace" font-size="5" fill="#8892b0">Deck 2</text>
  <text x="278" y="55" font-family="monospace" font-size="6" fill="#4ade80" text-anchor="end">8.8t</text>
  <text x="218" y="66" font-family="monospace" font-size="5" fill="#8892b0">GVW</text>
  <text x="278" y="66" font-family="monospace" font-size="6" fill="#f59e0b" text-anchor="end">17.9t</text>
  <!-- Camera/ANPR icon -->
  <rect x="310" y="14" width="80" height="36" rx="6" fill="#141928" stroke="#1e2d4e" stroke-width="1"/>
  <rect x="320" y="22" width="40" height="20" rx="3" fill="#1e2d4e"/>
  <circle cx="340" cy="32" r="7" fill="#253168"/>
  <circle cx="340" cy="32" r="4" fill="#9100B0" opacity="0.4"/>
  <rect x="358" y="28" width="10" height="8" rx="2" fill="#1e2d4e" stroke="#9100B0" stroke-width="0.8"/>
  <text x="350" y="56" font-family="monospace" font-size="5" fill="#8892b0" text-anchor="middle">ANPR</text>
  <!-- Label -->
  <text x="300" y="128" font-family="sans-serif" font-size="7" font-weight="bold" fill="#9100B0" text-anchor="middle">STATIC MULTIDECK</text>
  <text x="300" y="137" font-family="sans-serif" font-size="5" fill="#8892b0" text-anchor="middle">ZM / Cardinal / 1310 · TCP/Serial</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!--  BOTTOM-LEFT: Enforcement / Compliance         -->
  <!-- ═══════════════════════════════════════════════ -->
  <rect x="0" y="140" width="200" height="140" fill="#0d1220"/>
  <!-- Officer with tablet -->
  <circle cx="50" cy="175" r="16" fill="#1a2038" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="50" y="179" font-family="sans-serif" font-size="11" fill="#f59e0b" text-anchor="middle">👮</text>
  <!-- Tablet -->
  <rect x="74" y="155" width="54" height="76" rx="5" fill="#141928" stroke="#f59e0b" stroke-width="1"/>
  <rect x="78" y="160" width="46" height="60" rx="3" fill="#0a0e1a"/>
  <!-- Tablet content: axle weights -->
  <text x="101" y="172" font-family="monospace" font-size="5" fill="#f59e0b" text-anchor="middle">KURAWEIGH</text>
  <rect x="80" y="175" width="42" height="1" fill="#1e2d4e"/>
  <text x="80" y="184" font-family="monospace" font-size="4.5" fill="#8892b0">A1:</text>
  <text x="120" y="184" font-family="monospace" font-size="4.5" fill="#4ade80" text-anchor="end">7.2t OK</text>
  <text x="80" y="193" font-family="monospace" font-size="4.5" fill="#8892b0">A2:</text>
  <text x="120" y="193" font-family="monospace" font-size="4.5" fill="#ef4444" text-anchor="end">11.4t !!</text>
  <text x="80" y="202" font-family="monospace" font-size="4.5" fill="#8892b0">GVW:</text>
  <text x="120" y="202" font-family="monospace" font-size="4.5" fill="#ef4444" text-anchor="end">18.6t</text>
  <rect x="80" y="206" width="42" height="9" rx="4" fill="#ef4444" opacity="0.3"/>
  <rect x="80" y="206" width="42" height="9" rx="4" stroke="#ef4444" stroke-width="0.8"/>
  <text x="101" y="213" font-family="monospace" font-size="4" fill="#ef4444" text-anchor="middle">OVERLOAD 3.6t</text>
  <!-- Prohibition order stub -->
  <rect x="136" y="150" width="52" height="70" rx="4" fill="#141928" stroke="#1e2d4e" stroke-width="1"/>
  <rect x="136" y="150" width="52" height="16" rx="4" fill="#ef4444" opacity="0.3"/>
  <text x="162" y="161" font-family="monospace" font-size="4.5" fill="#ef4444" text-anchor="middle">PROHIBITION</text>
  <text x="162" y="173" font-family="monospace" font-size="4" fill="#8892b0" text-anchor="middle">Vehicle:</text>
  <text x="162" y="182" font-family="monospace" font-size="4.5" fill="#f0f0f0" text-anchor="middle">KDA 938P</text>
  <text x="162" y="191" font-family="monospace" font-size="4" fill="#8892b0" text-anchor="middle">Excess: 3.6t</text>
  <text x="162" y="200" font-family="monospace" font-size="4" fill="#8892b0" text-anchor="middle">Fine: KES 36K</text>
  <rect x="142" y="208" width="40" height="8" rx="4" fill="#ef4444" opacity="0.2"/>
  <rect x="142" y="208" width="40" height="8" rx="4" stroke="#ef4444" stroke-width="0.8"/>
  <text x="162" y="214" font-family="monospace" font-size="4" fill="#ef4444" text-anchor="middle">SEND TO YARD</text>
  <!-- Label -->
  <text x="100" y="267" font-family="sans-serif" font-size="7" font-weight="bold" fill="#f59e0b" text-anchor="middle">ENFORCEMENT</text>
  <text x="100" y="276" font-family="sans-serif" font-size="5" fill="#8892b0" text-anchor="middle">KURA Officers · Offline-capable PWA</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!--  BOTTOM-RIGHT: Commercial Weighing             -->
  <!-- ═══════════════════════════════════════════════ -->
  <rect x="200" y="140" width="200" height="140" fill="#0d1220"/>
  <!-- Weight ticket document -->
  <rect x="210" y="148" width="110" height="122" rx="6" fill="#141928" stroke="#1e2d4e" stroke-width="1"/>
  <rect x="210" y="148" width="110" height="24" rx="6" fill="#4ade80" opacity="0.2"/>
  <text x="265" y="164" font-family="monospace" font-size="6" font-weight="bold" fill="#4ade80" text-anchor="middle">WEIGHT TICKET</text>
  <rect x="220" y="174" width="90" height="1" fill="#1e2d4e"/>
  <text x="220" y="185" font-family="monospace" font-size="4.5" fill="#8892b0">Ticket No:</text>
  <text x="310" y="185" font-family="monospace" font-size="4.5" fill="#f0f0f0" text-anchor="end">TK-00441</text>
  <text x="220" y="195" font-family="monospace" font-size="4.5" fill="#8892b0">Vehicle:</text>
  <text x="310" y="195" font-family="monospace" font-size="4.5" fill="#f0f0f0" text-anchor="end">KDK 938P</text>
  <text x="220" y="205" font-family="monospace" font-size="4.5" fill="#8892b0">Commodity:</text>
  <text x="310" y="205" font-family="monospace" font-size="4.5" fill="#f0f0f0" text-anchor="end">Molasses</text>
  <text x="220" y="215" font-family="monospace" font-size="4.5" fill="#8892b0">Gross:</text>
  <text x="310" y="215" font-family="monospace" font-size="4.5" fill="#f0f0f0" text-anchor="end">32,400 kg</text>
  <text x="220" y="225" font-family="monospace" font-size="4.5" fill="#8892b0">Tare:</text>
  <text x="310" y="225" font-family="monospace" font-size="4.5" fill="#f0f0f0" text-anchor="end">14,200 kg</text>
  <rect x="220" y="229" width="90" height="1" fill="#1e2d4e"/>
  <text x="220" y="240" font-family="monospace" font-size="5" font-weight="bold" fill="#4ade80">NET</text>
  <text x="310" y="240" font-family="monospace" font-size="6" font-weight="bold" fill="#4ade80" text-anchor="end">18,200 kg</text>
  <!-- Compliant stamp -->
  <rect x="224" y="248" width="82" height="14" rx="7" fill="#15803d" opacity="0.3"/>
  <rect x="224" y="248" width="82" height="14" rx="7" stroke="#4ade80" stroke-width="1"/>
  <text x="265" y="258" font-family="monospace" font-size="5" fill="#4ade80" text-anchor="middle">COMPLIANT - CLEARED</text>
  <!-- Analytics panel right -->
  <rect x="328" y="148" width="64" height="122" rx="6" fill="#141928" stroke="#1e2d4e" stroke-width="1"/>
  <text x="360" y="164" font-family="monospace" font-size="5" fill="#8892b0" text-anchor="middle">ANALYTICS</text>
  <rect x="336" y="168" width="48" height="1" fill="#1e2d4e"/>
  <!-- Mini bar chart -->
  <rect x="336" y="220" width="6" height="24" rx="2" fill="#9100B0" opacity="0.5"/>
  <rect x="346" y="210" width="6" height="34" rx="2" fill="#9100B0" opacity="0.6"/>
  <rect x="356" y="200" width="6" height="44" rx="2" fill="#9100B0" opacity="0.8"/>
  <rect x="366" y="195" width="6" height="49" rx="2" fill="#4ade80"/>
  <rect x="336" y="244" width="36" height="1" fill="#1e2d4e"/>
  <text x="360" y="254" font-family="monospace" font-size="4" fill="#8892b0" text-anchor="middle">Daily vol.</text>
  <!-- Uptime -->
  <text x="360" y="176" font-family="monospace" font-size="5" fill="#4ade80" text-anchor="middle">99.8%</text>
  <text x="360" y="184" font-family="monospace" font-size="4" fill="#8892b0" text-anchor="middle">uptime</text>
  <text x="360" y="195" font-family="monospace" font-size="6" font-weight="bold" fill="#38bdf8" text-anchor="middle">348</text>
  <text x="360" y="204" font-family="monospace" font-size="4" fill="#8892b0" text-anchor="middle">trucks/day</text>
  <!-- Label -->
  <text x="300" y="267" font-family="sans-serif" font-size="7" font-weight="bold" fill="#4ade80" text-anchor="middle">COMMERCIAL WEIGHING</text>
  <text x="300" y="276" font-family="sans-serif" font-size="5" fill="#8892b0" text-anchor="middle">Weight Tickets · Certificates · Analytics</text>

  <!-- Centre label overlay -->
  <rect x="158" y="124" width="84" height="32" rx="8" fill="#0a0e1a" stroke="#1e2d4e" stroke-width="1"/>
  <text x="200" y="137" font-family="monospace" font-size="7" font-weight="bold" fill="#38bdf8" text-anchor="middle">TruLoad</text>
  <text x="200" y="150" font-family="monospace" font-size="5" fill="#8892b0" text-anchor="middle">All weighing. One platform.</text>
</svg>
