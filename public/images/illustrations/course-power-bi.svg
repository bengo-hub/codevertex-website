  <!-- Chart bars -->
  <rect x="52" y="186" width="24" height="60" rx="2" fill="#F59E0B" fill-opacity="0.5"/>
  <rect x="86" y="172" width="24" height="74" rx="2" fill="#F59E0B" fill-opacity="0.65"/>
  <rect x="120" y="158" width="24" height="88" rx="2" fill="#F59E0B" fill-opacity="0.75"/>
  <rect x="154" y="146" width="24" height="100" rx="2" fill="#F59E0B" fill-opacity="0.85"/>
  <rect x="188" y="156" width="24" height="90" rx="2" fill="#F59E0B" fill-opacity="0.8"/>
  <rect x="222" y="138" width="24" height="108" rx="2" fill="#F59E0B"/>
