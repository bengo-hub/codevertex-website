  <text x="64" y="254" fill="#6e7681" font-family="monospace" font-size="6.5" text-anchor="middle">Jan</text>
  <text x="98" y="254" fill="#6e7681" font-family="monospace" font-size="6.5" text-anchor="middle">Feb</text>
  <text x="132" y="254" fill="#6e7681" font-family="monospace" font-size="6.5" text-anchor="middle">Mar</text>
  <text x="166" y="254" fill="#6e7681" font-family="monospace" font-size="6.5" text-anchor="middle">Apr</text>
  <text x="200" y="254" fill="#6e7681" font-family="monospace" font-size="6.5" text-anchor="middle">May</text>
  <text x="234" y="254" fill="#6e7681" font-family="monospace" font-size="6.5" text-anchor="middle">Jun</text>

  <!-- Donut chart (middle right) -->
  <rect x="292" y="122" width="110" height="134" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="347" y="140" fill="#F59E0B" font-family="sans-serif" font-size="8.5" text-anchor="middle" font-weight="bold">By Region</text>
  <!-- Simple donut -->
  <circle cx="347" cy="188" r="38" fill="none" stroke="#0EA5E9" stroke-width="14" stroke-dasharray="80 160"/>
  <circle cx="347" cy="188" r="38" fill="none" stroke="#10B981" stroke-width="14" stroke-dasharray="56 160" stroke-dashoffset="-80"/>
  <circle cx="347" cy="188" r="38" fill="none" stroke="#F59E0B" stroke-width="14" stroke-dasharray="48 160" stroke-dashoffset="-136"/>
  <!-- Donut center -->
  <circle cx="347" cy="188" r="22" fill="#0d1117"/>
  <text x="347" y="185" fill="#e6edf3" font-family="sans-serif" font-size="10" text-anchor="middle" font-weight="bold">3</text>
