  <rect x="352" y="138" width="14" height="42" rx="2" fill="#6c47ff80"/>
  <rect x="370" y="142" width="14" height="38" rx="2" fill="#6c47ff80"/>
  <rect x="388" y="128" width="14" height="52" rx="2" fill="#a855f7"/>
  <rect x="406" y="134" width="14" height="46" rx="2" fill="#a855f7"/>
  <rect x="424" y="122" width="14" height="58" rx="2" fill="#a855f7"/>
