  <rect x="434" y="196" width="96" height="22" rx="6" fill="#38bdf810" stroke="#38bdf830" stroke-width="1"/>
  <text x="482" y="205" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#38bdf8" font-weight="bold">Demand Forecast</text>
