  <rect x="460" y="110" width="14" height="70" rx="2" fill="#a855f740" stroke="#a855f760" stroke-width="1" stroke-dasharray="2,2"/>
  <rect x="478" y="105" width="14" height="75" rx="2" fill="#a855f740" stroke="#a855f760" stroke-width="1" stroke-dasharray="2,2"/>
  <rect x="496" y="100" width="14" height="80" rx="2" fill="#a855f740" stroke="#a855f760" stroke-width="1" stroke-dasharray="2,2"/>
