<svg viewBox="0 0 400 280" xmlns="http://www.w3.org/2000/svg" fill="none">
  <rect width="400" height="280" rx="16" fill="#0f1117"/>
  <!-- Chat interface bg -->
  <rect x="20" y="20" width="260" height="240" rx="12" fill="#141928" stroke="#1e2d4e" stroke-width="1.5"/>
  <!-- Chat header -->
  <rect x="20" y="20" width="260" height="48" rx="12" fill="#1a2038"/>
  <rect x="20" y="56" width="260" height="12" fill="#1a2038"/>
  <circle cx="46" cy="44" r="14" fill="#6c47ff" opacity="0.3"/>
  <circle cx="46" cy="44" r="14" stroke="#6c47ff" stroke-width="1.5"/>
  <!-- AI face in circle -->
  <circle cx="42" cy="41" r="2" fill="#6c47ff"/>
  <circle cx="50" cy="41" r="2" fill="#6c47ff"/>
  <path d="M 41 47 Q 46 51 51 47" stroke="#6c47ff" stroke-width="1.5" stroke-linecap="round"/>
  <text x="68" y="40" font-family="sans-serif" font-size="10" font-weight="bold" fill="#f0f0f0">Vera AI</text>
  <text x="68" y="54" font-family="sans-serif" font-size="7" fill="#4ade80">● Online · Powered by Codevertex</text>
  <!-- User message -->
  <rect x="100" y="80" width="160" height="36" rx="10" fill="#6c47ff" opacity="0.2"/>
  <rect x="100" y="80" width="160" height="36" rx="10" stroke="#6c47ff" stroke-width="1"/>
  <text x="118" y="95" font-family="sans-serif" font-size="7" fill="#f0f0f0">What is my invoice status</text>
  <text x="118" y="107" font-family="sans-serif" font-size="7" fill="#f0f0f0">for Danka Africa?</text>
  <!-- AI response -->
  <rect x="30" y="126" width="180" height="56" rx="10" fill="#1e2d4e"/>
  <text x="42" y="142" font-family="sans-serif" font-size="7" fill="#f0f0f0">Invoice #INV-0089 for Danka</text>
  <text x="42" y="154" font-family="sans-serif" font-size="7" fill="#f0f0f0">Africa is <tspan fill="#4ade80">PAID</tspan> · KES 212,860</text>
  <text x="42" y="166" font-family="sans-serif" font-size="7" fill="#f0f0f0">Payment confirmed via M-Pesa</text>
  <text x="42" y="176" font-family="sans-serif" font-size="6" fill="#8892b0">on May 12, 2026 at 14:23</text>
  <!-- User message 2 -->
  <rect x="110" y="194" width="140" height="26" rx="10" fill="#6c47ff" opacity="0.2"/>
  <rect x="110" y="194" width="140" height="26" rx="10" stroke="#6c47ff" stroke-width="1"/>
  <text x="126" y="209" font-family="sans-serif" font-size="7" fill="#f0f0f0">Generate a summary report</text>
  <!-- Typing indicator -->
  <rect x="30" y="232" width="70" height="22" rx="10" fill="#1e2d4e"/>
  <circle cx="48" cy="243" r="4" fill="#8892b0" opacity="0.6"/>
  <circle cx="60" cy="243" r="4" fill="#8892b0" opacity="0.8"/>
  <circle cx="72" cy="243" r="4" fill="#8892b0"/>
  <!-- Input box -->
  <rect x="30" y="258" width="200" height="0" rx="6" fill="#1a2038"/>
  <!-- Right panel: capabilities -->
  <rect x="294" y="20" width="86" height="240" rx="12" fill="#141928" stroke="#1e2d4e" stroke-width="1.5"/>
  <text x="337" y="42" font-family="sans-serif" font-size="7" fill="#6c47ff" text-anchor="middle">CAPABILITIES</text>
  <rect x="304" y="48" width="66" height="1" fill="#1e2d4e"/>
  <!-- Feature chips -->
  <rect x="304" y="56" width="66" height="22" rx="6" fill="#1a2038"/>
  <text x="337" y="71" font-family="sans-serif" font-size="6" fill="#8892b0" text-anchor="middle">Invoice Q&amp;A</text>
  <rect x="304" y="84" width="66" height="22" rx="6" fill="#1a2038"/>
  <text x="337" y="99" font-family="sans-serif" font-size="6" fill="#8892b0" text-anchor="middle">ERP Insights</text>
  <rect x="304" y="112" width="66" height="22" rx="6" fill="#1a2038"/>
  <text x="337" y="127" font-family="sans-serif" font-size="6" fill="#8892b0" text-anchor="middle">Report Gen</text>
  <rect x="304" y="140" width="66" height="22" rx="6" fill="#1a2038"/>
  <text x="337" y="155" font-family="sans-serif" font-size="6" fill="#8892b0" text-anchor="middle">Data Analysis</text>
  <rect x="304" y="168" width="66" height="22" rx="6" fill="#6c47ff" opacity="0.2"/>
  <rect x="304" y="168" width="66" height="22" rx="6" stroke="#6c47ff" stroke-width="1"/>
  <text x="337" y="183" font-family="sans-serif" font-size="6" fill="#6c47ff" text-anchor="middle">24/7 Support</text>
  <!-- Model badge -->
  <rect x="300" y="220" width="74" height="34" rx="8" fill="#1a2038"/>
  <text x="337" y="234" font-family="sans-serif" font-size="6" fill="#8892b0" text-anchor="middle">Model</text>
  <text x="337" y="248" font-family="sans-serif" font-size="6" fill="#6c47ff" text-anchor="middle">claude-haiku</text>
</svg>
