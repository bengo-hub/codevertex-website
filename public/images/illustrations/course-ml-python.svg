<svg viewBox="0 0 560 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0820"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#9100B0" stop-opacity="0.09"/>
      <stop offset="100%" stop-color="#9100B0" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="560" height="280" fill="url(#bg)"/>
  <rect width="560" height="280" fill="url(#glow)"/>

  <text x="280" y="24" fill="#9100B0" font-family="sans-serif" font-size="10" text-anchor="middle" font-weight="bold" letter-spacing="2">MACHINE LEARNING WITH PYTHON</text>

  <!-- ML Pipeline visualization (top) -->
  <rect x="20" y="36" width="520" height="56" rx="8" fill="#161b22" stroke="#9100B0" stroke-opacity="0.25" stroke-width="1.5"/>
  <text x="35" y="56" fill="#9100B0" font-family="sans-serif" font-size="8" font-weight="bold">ML PIPELINE</text>

  <!-- Steps -->
  <rect x="35" y="62" width="72" height="22" rx="5" fill="#9100B0" fill-opacity="0.15" stroke="#9100B0" stroke-opacity="0.4" stroke-width="1"/>
  <text x="71" y="77" fill="#9100B0" font-family="sans-serif" font-size="8.5" text-anchor="middle">1. Raw Data</text>

  <text x="115" y="77" fill="#6e7681" font-family="monospace" font-size="10">→</text>

  <rect x="128" y="62" width="80" height="22" rx="5" fill="#0EA5E9" fill-opacity="0.12" stroke="#0EA5E9" stroke-opacity="0.4" stroke-width="1"/>
  <text x="168" y="77" fill="#0EA5E9" font-family="sans-serif" font-size="8.5" text-anchor="middle">2. Clean &amp; EDA</text>

  <text x="215" y="77" fill="#6e7681" font-family="monospace" font-size="10">→</text>

  <rect x="230" y="62" width="80" height="22" rx="5" fill="#10B981" fill-opacity="0.12" stroke="#10B981" stroke-opacity="0.4" stroke-width="1"/>
  <text x="270" y="77" fill="#10B981" font-family="sans-serif" font-size="8.5" text-anchor="middle">3. Train Model</text>

  <text x="317" y="77" fill="#6e7681" font-family="monospace" font-size="10">→</text>

  <rect x="332" y="62" width="80" height="22" rx="5" fill="#f59e0b" fill-opacity="0.12" stroke="#f59e0b" stroke-opacity="0.4" stroke-width="1"/>
  <text x="372" y="77" fill="#f59e0b" font-family="sans-serif" font-size="8.5" text-anchor="middle">4. Evaluate</text>

  <text x="419" y="77" fill="#6e7681" font-family="monospace" font-size="10">→</text>

  <rect x="434" y="62" width="88" height="22" rx="5" fill="#9100B0" fill-opacity="0.12" stroke="#9100B0" stroke-opacity="0.4" stroke-width="1"/>
  <text x="478" y="77" fill="#9100B0" font-family="sans-serif" font-size="8.5" text-anchor="middle">5. Deploy API</text>

  <!-- Training loss chart -->
  <rect x="20" y="102" width="245" height="160" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="35" y="122" fill="#9100B0" font-family="sans-serif" font-size="9" font-weight="bold">MODEL TRAINING CURVE</text>

  <!-- Chart area -->
  <rect x="32" y="130" width="220" height="120" rx="4" fill="#0d1117"/>
  <!-- Y axis labels -->
  <text x="42" y="148" fill="#6e7681" font-family="monospace" font-size="7">Loss</text>
  <text x="38" y="166" fill="#6e7681" font-family="monospace" font-size="6.5">0.8</text>
  <text x="38" y="186" fill="#6e7681" font-family="monospace" font-size="6.5">0.5</text>
  <text x="38" y="206" fill="#6e7681" font-family="monospace" font-size="6.5">0.3</text>
  <text x="38" y="230" fill="#6e7681" font-family="monospace" font-size="6.5">0.1</text>
  <line x1="52" y1="135" x2="52" y2="245" stroke="#30363d" stroke-width="1"/>
  <line x1="52" y1="245" x2="245" y2="245" stroke="#30363d" stroke-width="1"/>

  <!-- Training loss line (decreasing) -->
  <polyline points="55,158 75,162 95,170 115,178 135,186 155,194 175,208 195,222 215,230 235,238"
            fill="none" stroke="#ef4444" stroke-opacity="0.6" stroke-width="1.5" stroke-dasharray="4,2"/>
  <!-- Validation loss line -->
  <polyline points="55,160 75,158 95,162 115,172 135,180 155,192 175,200 195,210 215,216 235,220"
            fill="none" stroke="#9100B0" stroke-width="2"/>

  <!-- Epoch labels -->
  <text x="55" y="255" fill="#6e7681" font-family="monospace" font-size="6.5">0</text>
  <text x="110" y="255" fill="#6e7681" font-family="monospace" font-size="6.5">25</text>
  <text x="170" y="255" fill="#6e7681" font-family="monospace" font-size="6.5">50</text>
  <text x="225" y="255" fill="#6e7681" font-family="monospace" font-size="6.5">100</text>
  <text x="80" y="265" fill="#8b949e" font-family="monospace" font-size="7.5">Epochs →</text>

  <!-- Legend -->
  <line x1="58" y1="142" x2="78" y2="142" stroke="#9100B0" stroke-width="2"/>
  <text x="82" y="146" fill="#9100B0" font-family="monospace" font-size="7.5">Val Loss</text>
  <line x1="140" y1="142" x2="160" y2="142" stroke="#ef4444" stroke-opacity="0.6" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="164" y="146" fill="#ef4444" font-family="monospace" font-size="7.5">Train</text>

  <!-- Code panel right -->
  <rect x="281" y="102" width="259" height="160" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <rect x="281" y="102" width="259" height="26" rx="8" fill="#1c2333"/>
  <rect x="281" y="116" width="259" height="12" fill="#1c2333"/>
  <text x="360" y="119" fill="#9100B0" font-family="monospace" font-size="9" text-anchor="middle">model.py</text>

  <text x="293" y="144" fill="#d070e8" font-family="monospace" font-size="9">from</text>
  <text x="324" y="144" fill="#9100B0" font-family="monospace" font-size="9">sklearn</text>
  <text x="367" y="144" fill="#d070e8" font-family="monospace" font-size="9">import</text>
  <text x="406" y="144" fill="#9100B0" font-family="monospace" font-size="9">*</text>

  <text x="293" y="160" fill="#82aaff" font-family="monospace" font-size="9">X_train, X_test, y_train,</text>
  <text x="293" y="174" fill="#82aaff" font-family="monospace" font-size="9">y_test = train_test_split</text>
  <text x="293" y="188" fill="#82aaff" font-family="monospace" font-size="9">  (X, y, test_size=</text>
  <text x="398" y="188" fill="#f97316" font-family="monospace" font-size="9">0.2</text>
  <text x="415" y="188" fill="#82aaff" font-family="monospace" font-size="9">)</text>

  <text x="293" y="204" fill="#82aaff" font-family="monospace" font-size="9">model = RandomForest</text>
  <text x="293" y="218" fill="#82aaff" font-family="monospace" font-size="9">  Classifier(</text>
  <text x="358" y="218" fill="#d070e8" font-family="monospace" font-size="9">n_estimators</text>
  <text x="293" y="232" fill="#f97316" font-family="monospace" font-size="9">  =100</text>
  <text x="317" y="232" fill="#82aaff" font-family="monospace" font-size="9">)</text>

  <text x="293" y="248" fill="#10B981" font-family="monospace" font-size="9">model.fit(X_train, y_train)</text>
  <text x="293" y="258" fill="#3fb950" font-family="monospace" font-size="9">Accuracy: 94.2% ✓</text>
</svg>
