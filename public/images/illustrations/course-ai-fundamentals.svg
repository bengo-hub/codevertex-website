<svg viewBox="0 0 560 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0820"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#9100B0" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#9100B0" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="560" height="280" fill="url(#bg)"/>
  <rect width="560" height="280" fill="url(#glow)"/>

  <text x="280" y="24" fill="#9100B0" font-family="sans-serif" font-size="10" text-anchor="middle" font-weight="bold" letter-spacing="2">AI FUNDAMENTALS &amp; PROMPT ENGINEERING</text>

  <!-- Chat interface left -->
  <rect x="20" y="36" width="250" height="230" rx="10" fill="#161b22" stroke="#9100B0" stroke-opacity="0.3" stroke-width="1.5"/>
  <!-- Chat header -->
  <rect x="20" y="36" width="250" height="34" rx="10" fill="#1c1040"/>
  <rect x="20" y="58" width="250" height="12" fill="#1c1040"/>
  <circle cx="44" cy="53" r="10" fill="#9100B0" fill-opacity="0.3"/>
  <text x="44" y="57" fill="#9100B0" font-family="sans-serif" font-size="10" text-anchor="middle">AI</text>
  <text x="62" y="50" fill="#e6edf3" font-family="sans-serif" font-size="9.5" font-weight="bold">Claude / ChatGPT</text>
  <text x="62" y="63" fill="#10B981" font-family="sans-serif" font-size="7.5">● Online · Responding...</text>

  <!-- User message -->
  <rect x="100" y="78" width="160" height="38" rx="8" rx="8" fill="#9100B0" fill-opacity="0.2"/>
  <text x="108" y="92" fill="#e6edf3" font-family="sans-serif" font-size="8.5">Write me a marketing</text>
  <text x="108" y="105" fill="#e6edf3" font-family="sans-serif" font-size="8.5">plan for my startup</text>
  <text x="248" y="112" fill="#9100B0" font-family="sans-serif" font-size="7" text-anchor="end">You</text>

  <!-- AI response -->
  <rect x="28" y="124" width="185" height="72" rx="8" fill="#10B981" fill-opacity="0.08" stroke="#10B981" stroke-opacity="0.2" stroke-width="1"/>
  <text x="36" y="140" fill="#e6edf3" font-family="sans-serif" font-size="8">Here's a 4-step plan:</text>
  <text x="36" y="154" fill="#10B981" font-family="sans-serif" font-size="8">1. Market Research (Week 1)</text>
  <text x="36" y="167" fill="#10B981" font-family="sans-serif" font-size="8">2. Define ICP (Week 2)</text>
  <text x="36" y="180" fill="#10B981" font-family="sans-serif" font-size="8">3. Content Strategy (Week 3)</text>
  <text x="36" y="193" fill="#10B981" font-family="sans-serif" font-size="8">4. Launch Campaign ✓</text>
  <text x="36" y="192" fill="#9100B0" font-family="sans-serif" font-size="7">Claude</text>

  <!-- Better prompt -->
  <rect x="100" y="204" width="160" height="50" rx="8" fill="#9100B0" fill-opacity="0.2"/>
  <text x="108" y="218" fill="#6e7681" font-family="sans-serif" font-size="7">Prompt engineering tip:</text>
  <text x="108" y="230" fill="#e6edf3" font-family="sans-serif" font-size="8">Act as a CMO. Create a</text>
  <text x="108" y="242" fill="#e6edf3" font-family="sans-serif" font-size="8">detailed 30-day plan for</text>
  <text x="108" y="254" fill="#e6edf3" font-family="sans-serif" font-size="8">a B2B SaaS in Kenya</text>

  <!-- Neural network visualization -->
  <rect x="286" y="36" width="256" height="150" rx="8" fill="#0d1117" stroke="#9100B0" stroke-opacity="0.2" stroke-width="1"/>
  <text x="300" y="56" fill="#9100B0" font-family="sans-serif" font-size="9" font-weight="bold">HOW LLMs WORK</text>

  <!-- Input layer -->
  <circle cx="315" cy="85" r="10" fill="#9100B0" fill-opacity="0.2" stroke="#9100B0" stroke-opacity="0.5" stroke-width="1.5"/>
  <circle cx="315" cy="110" r="10" fill="#9100B0" fill-opacity="0.2" stroke="#9100B0" stroke-opacity="0.5" stroke-width="1.5"/>
  <circle cx="315" cy="135" r="10" fill="#9100B0" fill-opacity="0.2" stroke="#9100B0" stroke-opacity="0.5" stroke-width="1.5"/>
  <circle cx="315" cy="160" r="10" fill="#9100B0" fill-opacity="0.2" stroke="#9100B0" stroke-opacity="0.5" stroke-width="1.5"/>
  <text x="305" y="60" fill="#6e7681" font-family="monospace" font-size="7">Tokens</text>

  <!-- Hidden layer 1 -->
  <circle cx="368" cy="75" r="10" fill="#0EA5E9" fill-opacity="0.2" stroke="#0EA5E9" stroke-opacity="0.4" stroke-width="1.5"/>
  <circle cx="368" cy="100" r="10" fill="#0EA5E9" fill-opacity="0.2" stroke="#0EA5E9" stroke-opacity="0.4" stroke-width="1.5"/>
  <circle cx="368" cy="125" r="10" fill="#0EA5E9" fill-opacity="0.2" stroke="#0EA5E9" stroke-opacity="0.4" stroke-width="1.5"/>
  <circle cx="368" cy="150" r="10" fill="#0EA5E9" fill-opacity="0.2" stroke="#0EA5E9" stroke-opacity="0.4" stroke-width="1.5"/>
  <circle cx="368" cy="175" r="10" fill="#0EA5E9" fill-opacity="0.2" stroke="#0EA5E9" stroke-opacity="0.4" stroke-width="1.5"/>

  <!-- Hidden layer 2 -->
  <circle cx="421" cy="85" r="10" fill="#10B981" fill-opacity="0.2" stroke="#10B981" stroke-opacity="0.4" stroke-width="1.5"/>
  <circle cx="421" cy="110" r="10" fill="#10B981" fill-opacity="0.2" stroke="#10B981" stroke-opacity="0.4" stroke-width="1.5"/>
  <circle cx="421" cy="135" r="10" fill="#10B981" fill-opacity="0.2" stroke="#10B981" stroke-opacity="0.4" stroke-width="1.5"/>
  <circle cx="421" cy="160" r="10" fill="#10B981" fill-opacity="0.2" stroke="#10B981" stroke-opacity="0.4" stroke-width="1.5"/>

  <!-- Output -->
  <circle cx="474" cy="100" r="10" fill="#f59e0b" fill-opacity="0.2" stroke="#f59e0b" stroke-opacity="0.5" stroke-width="1.5"/>
  <circle cx="474" cy="130" r="10" fill="#f59e0b" fill-opacity="0.2" stroke="#f59e0b" stroke-opacity="0.5" stroke-width="1.5"/>
  <circle cx="474" cy="160" r="10" fill="#f59e0b" fill-opacity="0.2" stroke="#f59e0b" stroke-opacity="0.5" stroke-width="1.5"/>
  <text x="456" y="56" fill="#6e7681" font-family="monospace" font-size="7">Response</text>

  <!-- Neural connections -->
  <line x1="325" y1="85" x2="358" y2="75" stroke="#9100B0" stroke-opacity="0.15" stroke-width="1"/>
  <line x1="325" y1="85" x2="358" y2="100" stroke="#9100B0" stroke-opacity="0.15" stroke-width="1"/>
  <line x1="325" y1="110" x2="358" y2="75" stroke="#9100B0" stroke-opacity="0.15" stroke-width="1"/>
  <line x1="325" y1="110" x2="358" y2="125" stroke="#9100B0" stroke-opacity="0.2" stroke-width="1"/>
  <line x1="325" y1="135" x2="358" y2="125" stroke="#9100B0" stroke-opacity="0.15" stroke-width="1"/>
  <line x1="325" y1="135" x2="358" y2="150" stroke="#9100B0" stroke-opacity="0.15" stroke-width="1"/>
  <line x1="325" y1="160" x2="358" y2="150" stroke="#9100B0" stroke-opacity="0.15" stroke-width="1"/>
  <line x1="325" y1="160" x2="358" y2="175" stroke="#9100B0" stroke-opacity="0.15" stroke-width="1"/>

  <line x1="378" y1="75" x2="411" y2="85" stroke="#0EA5E9" stroke-opacity="0.15" stroke-width="1"/>
  <line x1="378" y1="100" x2="411" y2="85" stroke="#0EA5E9" stroke-opacity="0.2" stroke-width="1"/>
  <line x1="378" y1="100" x2="411" y2="110" stroke="#0EA5E9" stroke-opacity="0.15" stroke-width="1"/>
  <line x1="378" y1="125" x2="411" y2="110" stroke="#0EA5E9" stroke-opacity="0.15" stroke-width="1"/>
  <line x1="378" y1="125" x2="411" y2="135" stroke="#0EA5E9" stroke-opacity="0.2" stroke-width="1"/>
  <line x1="378" y1="150" x2="411" y2="135" stroke="#0EA5E9" stroke-opacity="0.15" stroke-width="1"/>
  <line x1="378" y1="150" x2="411" y2="160" stroke="#0EA5E9" stroke-opacity="0.15" stroke-width="1"/>
  <line x1="378" y1="175" x2="411" y2="160" stroke="#0EA5E9" stroke-opacity="0.15" stroke-width="1"/>

  <line x1="431" y1="85" x2="464" y2="100" stroke="#10B981" stroke-opacity="0.2" stroke-width="1"/>
  <line x1="431" y1="110" x2="464" y2="100" stroke="#10B981" stroke-opacity="0.2" stroke-width="1"/>
  <line x1="431" y1="110" x2="464" y2="130" stroke="#10B981" stroke-opacity="0.2" stroke-width="1"/>
  <line x1="431" y1="135" x2="464" y2="130" stroke="#10B981" stroke-opacity="0.25" stroke-width="1"/>
  <line x1="431" y1="135" x2="464" y2="160" stroke="#10B981" stroke-opacity="0.2" stroke-width="1"/>
  <line x1="431" y1="160" x2="464" y2="160" stroke="#10B981" stroke-opacity="0.25" stroke-width="1"/>

  <!-- Prompt techniques panel -->
  <rect x="286" y="196" width="256" height="70" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="300" y="214" fill="#9100B0" font-family="sans-serif" font-size="9" font-weight="bold">PROMPT ENGINEERING PATTERNS</text>
  <text x="300" y="230" fill="#10B981" font-family="monospace" font-size="8">Zero-shot · Few-shot · Chain-of-thought</text>
  <text x="300" y="245" fill="#0EA5E9" font-family="monospace" font-size="8">Role prompting · Tree of thought</text>
  <text x="300" y="260" fill="#6e7681" font-family="monospace" font-size="8">ChatGPT · Claude · Gemini · Copilot</text>
</svg>
