<svg viewBox="0 0 560 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0f20"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="560" height="280" fill="url(#bg)"/>
  <rect width="560" height="280" fill="url(#glow)"/>

  <!-- Game viewport -->
  <rect x="20" y="20" width="320" height="200" rx="10" fill="#0d1117" stroke="#8b5cf6" stroke-opacity="0.5" stroke-width="2"/>
  <!-- Game title bar -->
  <rect x="20" y="20" width="320" height="28" rx="10" fill="#1c1040"/>
  <rect x="20" y="36" width="320" height="12" fill="#1c1040"/>
  <text x="40" y="39" fill="#f59e0b" font-family="monospace" font-size="10" font-weight="bold">SCORE: 3200</text>
  <text x="260" y="39" fill="#ef4444" font-family="monospace" font-size="10">♥♥♥</text>

  <!-- Game world: sky gradient -->
  <rect x="20" y="48" width="320" height="100" fill="#0a0f2e"/>
  <!-- Stars -->
  <circle cx="60" cy="60" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="120" cy="75" r="1" fill="white" opacity="0.5"/>
  <circle cx="200" cy="58" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="280" cy="68" r="1" fill="white" opacity="0.6"/>
  <circle cx="310" cy="55" r="1.5" fill="white" opacity="0.4"/>

  <!-- Coins -->
  <circle cx="100" cy="90" r="8" fill="#f59e0b"/>
  <text x="100" y="94" fill="#7c5100" font-family="sans-serif" font-size="10" text-anchor="middle" font-weight="bold">$</text>
  <circle cx="160" cy="80" r="8" fill="#f59e0b" opacity="0.3"/>
  <circle cx="220" cy="90" r="8" fill="#f59e0b"/>
  <text x="220" y="94" fill="#7c5100" font-family="sans-serif" font-size="10" text-anchor="middle" font-weight="bold">$</text>

  <!-- Ground platforms -->
  <rect x="20" y="148" width="320" height="20" fill="#10B981" fill-opacity="0.3"/>
  <rect x="20" y="148" width="320" height="4" fill="#10B981" fill-opacity="0.6"/>
  <!-- Platform floating -->
  <rect x="100" y="118" width="80" height="12" rx="3" fill="#8b5cf6" fill-opacity="0.6"/>
  <rect x="100" y="118" width="80" height="4" rx="3" fill="#8b5cf6" fill-opacity="0.8"/>
  <rect x="240" y="108" width="60" height="12" rx="3" fill="#8b5cf6" fill-opacity="0.6"/>

  <!-- Player character -->
  <rect x="55" y="128" width="24" height="20" rx="4" fill="#38bdf8"/>
  <rect x="60" y="122" width="14" height="12" rx="6" fill="#fbbf24"/>
  <circle cx="64" cy="126" r="2" fill="#1e293b"/>
  <circle cx="70" cy="126" r="2" fill="#1e293b"/>

  <!-- Enemy -->
  <rect x="260" y="130" width="22" height="18" rx="4" fill="#ef4444"/>
  <rect x="263" y="125" width="16" height="11" rx="5" fill="#fca5a5"/>
  <rect x="261" y="122" width="6" height="6" rx="3" fill="#ef4444"/>
  <rect x="275" y="122" width="6" height="6" rx="3" fill="#ef4444"/>

  <!-- Explosion particle effects -->
  <circle cx="185" cy="105" r="12" fill="#f59e0b" fill-opacity="0.15" stroke="#f59e0b" stroke-opacity="0.4" stroke-width="1"/>
  <text x="185" y="110" fill="#f59e0b" font-family="sans-serif" font-size="14" text-anchor="middle">✦</text>

  <!-- Game UI overlay -->
  <rect x="20" y="168" width="320" height="52" fill="#161b22"/>
  <!-- Health bar -->
  <text x="36" y="184" fill="#6e7681" font-family="monospace" font-size="8">HP</text>
  <rect x="50" y="177" width="100" height="8" rx="4" fill="#30363d"/>
  <rect x="50" y="177" width="72" height="8" rx="4" fill="#10B981"/>
  <!-- XP bar -->
  <text x="36" y="202" fill="#6e7681" font-family="monospace" font-size="8">XP</text>
  <rect x="50" y="195" width="100" height="8" rx="4" fill="#30363d"/>
  <rect x="50" y="195" width="45" height="8" rx="4" fill="#8b5cf6"/>

  <text x="200" y="192" fill="#f59e0b" font-family="monospace" font-size="10">LEVEL 4</text>
  <text x="200" y="210" fill="#6e7681" font-family="monospace" font-size="8">→ → ↑ Space</text>

  <!-- Right panel: code -->
  <rect x="356" y="20" width="186" height="200" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <rect x="356" y="20" width="186" height="28" rx="10" fill="#1c2333"/>
  <rect x="356" y="36" width="186" height="12" fill="#1c2333"/>
  <text x="413" y="38" fill="#8b5cf6" font-family="monospace" font-size="9" text-anchor="middle">game.py</text>

  <text x="368" y="62" fill="#637777" font-family="monospace" font-size="8"># Pygame platformer</text>
  <text x="368" y="76" fill="#c792ea" font-family="monospace" font-size="8">import</text>
  <text x="406" y="76" fill="#f78c6c" font-family="monospace" font-size="8">pygame</text>

  <text x="368" y="92" fill="#82aaff" font-family="monospace" font-size="8">WIN = pygame.display</text>
  <text x="368" y="106" fill="#82aaff" font-family="monospace" font-size="8">  .set_mode((800,600))</text>

  <text x="368" y="122" fill="#c792ea" font-family="monospace" font-size="8">class</text>
  <text x="400" y="122" fill="#10B981" font-family="monospace" font-size="8">Player</text>
  <text x="436" y="122" fill="#cdd9e5" font-family="monospace" font-size="8">(pygame</text>
  <text x="368" y="136" fill="#cdd9e5" font-family="monospace" font-size="8">  .sprite.Sprite):</text>

  <text x="368" y="152" fill="#82aaff" font-family="monospace" font-size="8">  def update(self):</text>
  <text x="368" y="166" fill="#cdd9e5" font-family="monospace" font-size="8">    keys = pygame</text>
  <text x="368" y="180" fill="#cdd9e5" font-family="monospace" font-size="8">      .key.get_pressed()</text>
  <text x="368" y="194" fill="#10B981" font-family="monospace" font-size="8">    self.jump(keys)</text>
  <text x="368" y="208" fill="#637777" font-family="monospace" font-size="8">    # Physics ✓</text>

  <!-- Bottom strip -->
  <rect x="20" y="232" width="522" height="36" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="40" y="248" fill="#8b5cf6" font-family="sans-serif" font-size="10" font-weight="bold">Ages 10–16</text>
  <text x="40" y="262" fill="#6e7681" font-family="sans-serif" font-size="8">Build 2D games you can play and share!</text>
  <text x="350" y="248" fill="#6e7681" font-family="sans-serif" font-size="8">Python Pygame · Unity 2D (C#)</text>
  <text x="350" y="262" fill="#6e7681" font-family="sans-serif" font-size="8">Game design · Physics · Animation</text>
  <text x="490" y="248" fill="#10B981" font-family="sans-serif" font-size="10" font-weight="bold">6 Weeks</text>
</svg>
