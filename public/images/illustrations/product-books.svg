<svg viewBox="0 0 400 280" xmlns="http://www.w3.org/2000/svg" fill="none">
  <rect width="400" height="280" rx="16" fill="#0f1117"/>
  <!-- Main invoice card -->
  <rect x="30" y="30" width="200" height="220" rx="12" fill="#141928" stroke="#1e2d4e" stroke-width="1.5"/>
  <!-- Invoice header -->
  <rect x="30" y="30" width="200" height="48" rx="12" fill="#1a2038"/>
  <rect x="30" y="66" width="200" height="12" fill="#1a2038"/>
  <text x="50" y="52" font-family="sans-serif" font-size="9" font-weight="bold" fill="#f0f0f0">INVOICE #INV-0089</text>
  <text x="50" y="66" font-family="sans-serif" font-size="7" fill="#8892b0">Due: May 30, 2026</text>
  <!-- Client info -->
  <text x="50" y="96" font-family="sans-serif" font-size="7" fill="#8892b0">Bill to:</text>
  <text x="50" y="110" font-family="sans-serif" font-size="8" font-weight="bold" fill="#f0f0f0">Danka Africa Ltd</text>
  <text x="50" y="122" font-family="sans-serif" font-size="7" fill="#8892b0">Kisumu, KE · VAT 12345678</text>
  <rect x="40" y="130" width="180" height="1" fill="#1e2d4e"/>
  <!-- Line items -->
  <text x="50" y="146" font-family="sans-serif" font-size="7" fill="#8892b0">Software License (Annual)</text>
  <text x="220" y="146" font-family="sans-serif" font-size="7" fill="#f0f0f0" text-anchor="end">120,000</text>
  <text x="50" y="160" font-family="sans-serif" font-size="7" fill="#8892b0">Support Retainer × 3mo</text>
  <text x="220" y="160" font-family="sans-serif" font-size="7" fill="#f0f0f0" text-anchor="end">45,000</text>
  <text x="50" y="174" font-family="sans-serif" font-size="7" fill="#8892b0">Setup & Training</text>
  <text x="220" y="174" font-family="sans-serif" font-size="7" fill="#f0f0f0" text-anchor="end">18,500</text>
  <rect x="40" y="180" width="180" height="1" fill="#1e2d4e"/>
  <!-- Subtotal/total -->
  <text x="50" y="194" font-family="sans-serif" font-size="7" fill="#8892b0">Subtotal</text>
  <text x="220" y="194" font-family="sans-serif" font-size="7" fill="#f0f0f0" text-anchor="end">183,500</text>
  <text x="50" y="208" font-family="sans-serif" font-size="7" fill="#8892b0">VAT (16%)</text>
  <text x="220" y="208" font-family="sans-serif" font-size="7" fill="#f0f0f0" text-anchor="end">29,360</text>
  <rect x="40" y="214" width="180" height="1" fill="#1e2d4e"/>
  <text x="50" y="228" font-family="sans-serif" font-size="9" font-weight="bold" fill="#6c47ff">TOTAL</text>
  <text x="220" y="228" font-family="sans-serif" font-size="11" font-weight="bold" fill="#6c47ff" text-anchor="end">KES 212,860</text>
  <!-- Paid stamp -->
  <rect x="50" y="236" width="90" height="20" rx="10" fill="#15803d" opacity="0.2"/>
  <rect x="50" y="236" width="90" height="20" rx="10" stroke="#4ade80" stroke-width="1.5"/>
  <text x="95" y="249" font-family="sans-serif" font-size="8" font-weight="bold" fill="#4ade80" text-anchor="middle">✓ PAID - M-PESA</text>
  <!-- Payment channels panel -->
  <rect x="244" y="30" width="126" height="80" rx="10" fill="#141928" stroke="#1e2d4e" stroke-width="1"/>
  <text x="307" y="48" font-family="sans-serif" font-size="8" fill="#8892b0" text-anchor="middle">Payment Gateway</text>
  <rect x="254" y="54" width="106" height="1" fill="#1e2d4e"/>
  <!-- M-Pesa -->
  <rect x="256" y="60" width="48" height="18" rx="6" fill="#15803d" opacity="0.3"/>
  <rect x="256" y="60" width="48" height="18" rx="6" stroke="#4ade80" stroke-width="1"/>
  <text x="280" y="72" font-family="sans-serif" font-size="7" fill="#4ade80" text-anchor="middle">M-Pesa</text>
  <!-- Paystack -->
  <rect x="312" y="60" width="48" height="18" rx="6" fill="#6c47ff" opacity="0.2"/>
  <rect x="312" y="60" width="48" height="18" rx="6" stroke="#6c47ff" stroke-width="1"/>
  <text x="336" y="72" font-family="sans-serif" font-size="7" fill="#6c47ff" text-anchor="middle">Paystack</text>
  <!-- Card -->
  <rect x="256" y="84" width="104" height="18" rx="6" fill="#1e2d4e"/>
  <text x="308" y="96" font-family="sans-serif" font-size="7" fill="#8892b0" text-anchor="middle">Visa / Mastercard</text>
  <!-- Project tracker -->
  <rect x="244" y="120" width="126" height="130" rx="10" fill="#141928" stroke="#1e2d4e" stroke-width="1"/>
  <text x="307" y="138" font-family="sans-serif" font-size="8" fill="#8892b0" text-anchor="middle">Project Tracker</text>
  <rect x="254" y="144" width="106" height="1" fill="#1e2d4e"/>
  <!-- Progress bars -->
  <text x="256" y="158" font-family="sans-serif" font-size="7" fill="#8892b0">Website Redesign</text>
  <rect x="256" y="162" width="106" height="6" rx="3" fill="#1e2d4e"/>
  <rect x="256" y="162" width="82" height="6" rx="3" fill="#6c47ff" opacity="0.7"/>
  <text x="362" y="168" font-family="sans-serif" font-size="6" fill="#6c47ff">77%</text>
  <text x="256" y="180" font-family="sans-serif" font-size="7" fill="#8892b0">ERP Integration</text>
  <rect x="256" y="184" width="106" height="6" rx="3" fill="#1e2d4e"/>
  <rect x="256" y="184" width="56" height="6" rx="3" fill="#38bdf8" opacity="0.7"/>
  <text x="362" y="190" font-family="sans-serif" font-size="6" fill="#38bdf8">53%</text>
  <text x="256" y="202" font-family="sans-serif" font-size="7" fill="#8892b0">Staff Training</text>
  <rect x="256" y="206" width="106" height="6" rx="3" fill="#1e2d4e"/>
  <rect x="256" y="206" width="98" height="6" rx="3" fill="#4ade80" opacity="0.7"/>
  <text x="362" y="212" font-family="sans-serif" font-size="6" fill="#4ade80">93%</text>
  <!-- Team avatars -->
  <rect x="254" y="220" width="106" height="1" fill="#1e2d4e"/>
  <text x="256" y="234" font-family="sans-serif" font-size="7" fill="#8892b0">Team</text>
  <circle cx="310" cy="232" r="8" fill="#6c47ff" opacity="0.5"/>
  <circle cx="324" cy="232" r="8" fill="#38bdf8" opacity="0.5"/>
  <circle cx="338" cy="232" r="8" fill="#f59e0b" opacity="0.5"/>
  <text x="350" y="237" font-family="sans-serif" font-size="7" fill="#8892b0">+4</text>
</svg>
