<svg viewBox="0 0 560 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#071a10"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#10B981" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="560" height="280" fill="url(#bg)"/>
  <rect width="560" height="280" fill="url(#glow)"/>

  <!-- Browser mockup - main desktop -->
  <rect x="20" y="20" width="340" height="240" rx="10" fill="#161b22" stroke="#10B981" stroke-opacity="0.25" stroke-width="1.5"/>
  <!-- Browser chrome -->
  <rect x="20" y="20" width="340" height="36" rx="10" fill="#1c2333"/>
  <rect x="20" y="44" width="340" height="12" fill="#1c2333"/>
  <circle cx="40" cy="38" r="5" fill="#ff5f57"/>
  <circle cx="58" cy="38" r="5" fill="#ffbd2e"/>
  <circle cx="76" cy="38" r="5" fill="#28c940"/>
  <!-- URL bar -->
  <rect x="92" y="30" width="220" height="16" rx="8" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="104" y="41" fill="#3fb950" font-family="monospace" font-size="8">🔒 myportfolio.github.io</text>

  <!-- Website content inside browser -->
  <!-- Nav -->
  <rect x="20" y="56" width="340" height="30" fill="#10B981" fill-opacity="0.15"/>
  <text x="40" y="75" fill="#10B981" font-family="sans-serif" font-size="11" font-weight="bold">Sarah M.</text>
  <text x="200" y="75" fill="#cdd9e5" font-family="sans-serif" font-size="9">About · Work · Contact</text>

  <!-- Hero section -->
  <rect x="20" y="86" width="340" height="60" fill="#0d1117"/>
  <text x="40" y="108" fill="#e6edf3" font-family="sans-serif" font-size="14" font-weight="bold">Future Developer 👩‍💻</text>
  <text x="40" y="126" fill="#6e7681" font-family="sans-serif" font-size="9">Building the web, one line at a time.</text>
  <rect x="40" y="132" width="70" height="20" rx="10" fill="#10B981"/>
  <text x="75" y="145" fill="white" font-family="sans-serif" font-size="9" text-anchor="middle" font-weight="bold">View Work ↗</text>

  <!-- Projects grid -->
  <rect x="30" y="156" width="100" height="60" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <rect x="30" y="156" width="100" height="30" rx="6" fill="#38bdf8" fill-opacity="0.2"/>
  <text x="80" y="176" fill="#38bdf8" font-family="sans-serif" font-size="18" text-anchor="middle">🌐</text>
  <text x="80" y="205" fill="#cdd9e5" font-family="sans-serif" font-size="8" text-anchor="middle">Portfolio Site</text>
  <text x="80" y="215" fill="#6e7681" font-family="sans-serif" font-size="7" text-anchor="middle">HTML · CSS</text>

  <rect x="140" y="156" width="100" height="60" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <rect x="140" y="156" width="100" height="30" rx="6" fill="#f59e0b" fill-opacity="0.2"/>
  <text x="190" y="176" fill="#f59e0b" font-family="sans-serif" font-size="18" text-anchor="middle">☀️</text>
  <text x="190" y="205" fill="#cdd9e5" font-family="sans-serif" font-size="8" text-anchor="middle">Weather App</text>
  <text x="190" y="215" fill="#6e7681" font-family="sans-serif" font-size="7" text-anchor="middle">JavaScript</text>

  <rect x="250" y="156" width="100" height="60" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <rect x="250" y="156" width="100" height="30" rx="6" fill="#9100B0" fill-opacity="0.2"/>
  <text x="300" y="176" fill="#9100B0" font-family="sans-serif" font-size="18" text-anchor="middle">📝</text>
  <text x="300" y="205" fill="#cdd9e5" font-family="sans-serif" font-size="8" text-anchor="middle">Blog</text>
  <text x="300" y="215" fill="#6e7681" font-family="sans-serif" font-size="7" text-anchor="middle">Responsive</text>

  <!-- Footer -->
  <rect x="20" y="225" width="340" height="35" fill="#0d1117"/>
  <text x="190" y="246" fill="#6e7681" font-family="sans-serif" font-size="8" text-anchor="middle">© 2026 Sarah M. · Built with HTML, CSS &amp; JavaScript</text>

  <!-- Right side: code panel + responsive frames -->
  <rect x="374" y="20" width="168" height="150" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <rect x="374" y="20" width="168" height="26" rx="8" fill="#1c2333"/>
  <rect x="374" y="34" width="168" height="12" fill="#1c2333"/>
  <text x="430" y="36" fill="#6e7681" font-family="monospace" font-size="8">style.css</text>

  <text x="384" y="60" fill="#d070e8" font-family="monospace" font-size="8">.hero {'{'}</text>
  <text x="384" y="74" fill="#82aaff" font-family="monospace" font-size="8">  display:</text>
  <text x="446" y="74" fill="#9100B0" font-family="monospace" font-size="8">flex;</text>
  <text x="384" y="88" fill="#82aaff" font-family="monospace" font-size="8">  background:</text>
  <text x="384" y="102" fill="#9100B0" font-family="monospace" font-size="8">    linear-gradient(</text>
  <text x="384" y="116" fill="#9100B0" font-family="monospace" font-size="8">    #10B981,#0d1117);</text>
  <text x="384" y="130" fill="#10B981" font-family="monospace" font-size="8">  border-radius:</text>
  <text x="384" y="144" fill="#f97316" font-family="monospace" font-size="8">    12px;</text>
  <text x="384" y="158" fill="#d070e8" font-family="monospace" font-size="8">{'}'}</text>

  <!-- Responsive device frames -->
  <text x="374" y="190" fill="#8b949e" font-family="sans-serif" font-size="8" font-weight="bold">RESPONSIVE ON ALL DEVICES</text>

  <!-- Tablet -->
  <rect x="374" y="198" width="70" height="56" rx="5" fill="#0d1117" stroke="#10B981" stroke-opacity="0.4" stroke-width="1.5"/>
  <rect x="380" y="204" width="58" height="44" fill="#161b22" rx="2"/>
  <rect x="380" y="204" width="58" height="10" fill="#10B981" fill-opacity="0.3"/>
  <text x="409" y="235" fill="#6e7681" font-family="sans-serif" font-size="7" text-anchor="middle">Tablet</text>
  <rect x="402" y="252" width="14" height="3" rx="1.5" fill="#30363d"/>

  <!-- Phone -->
  <rect x="458" y="198" width="40" height="60" rx="6" fill="#0d1117" stroke="#38bdf8" stroke-opacity="0.4" stroke-width="1.5"/>
  <rect x="464" y="206" width="28" height="46" fill="#161b22" rx="2"/>
  <rect x="464" y="206" width="28" height="8" fill="#38bdf8" fill-opacity="0.3"/>
  <text x="478" y="240" fill="#6e7681" font-family="sans-serif" font-size="7" text-anchor="middle">Mobile</text>
  <rect x="472" y="256" width="12" height="3" rx="1.5" fill="#30363d"/>

  <text x="374" y="270" fill="#6e7681" font-family="sans-serif" font-size="8">Ages 13–17 · Live site deployment</text>
</svg>
