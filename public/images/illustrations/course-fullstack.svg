  <rect x="40" y="132" width="480" height="58" rx="8" fill="#38bdf8" fill-opacity="0.05" stroke="#38bdf8" stroke-opacity="0.25" stroke-width="1"/>
  <text x="60" y="152" fill="#38bdf8" font-family="monospace" font-size="10" font-weight="bold">BACKEND API</text>
