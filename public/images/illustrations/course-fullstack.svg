<svg viewBox="0 0 560 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#071a10"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#10B981" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="560" height="280" fill="url(#bg)"/>
  <rect width="560" height="280" fill="url(#glow)"/>

  <!-- Title -->
  <text x="280" y="28" fill="#8b949e" font-family="sans-serif" font-size="10" font-weight="bold" text-anchor="middle" letter-spacing="2">FULL-STACK ARCHITECTURE</text>

  <!-- FRONTEND layer -->
  <rect x="40" y="42" width="480" height="58" rx="8" fill="#10B981" fill-opacity="0.06" stroke="#10B981" stroke-opacity="0.3" stroke-width="1"/>
  <text x="60" y="62" fill="#10B981" font-family="monospace" font-size="10" font-weight="bold">FRONTEND</text>
  <!-- React components -->
  <rect x="110" y="52" width="55" height="38" rx="5" fill="#161b22" stroke="#38bdf8" stroke-opacity="0.4" stroke-width="1"/>
  <text x="137" y="70" fill="#38bdf8" font-family="monospace" font-size="9" text-anchor="middle">{'<App/>'}</text>
  <text x="137" y="82" fill="#6e7681" font-family="monospace" font-size="8" text-anchor="middle">React</text>

  <rect x="176" y="52" width="60" height="38" rx="5" fill="#161b22" stroke="#10B981" stroke-opacity="0.4" stroke-width="1"/>
