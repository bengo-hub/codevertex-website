  <text x="237" y="172" fill="#6e7681" font-family="monospace" font-size="8" text-anchor="middle">Node.js</text>

  <rect x="289" y="142" width="80" height="38" rx="5" fill="#161b22" stroke="#38bdf8" stroke-opacity="0.35" stroke-width="1"/>
  <text x="329" y="158" fill="#9100B0" font-family="monospace" font-size="8.5" text-anchor="middle">PUT /items</text>
  <text x="329" y="172" fill="#6e7681" font-family="monospace" font-size="8" text-anchor="middle">REST API</text>

  <text x="400" y="164" fill="#6e7681" font-family="sans-serif" font-size="10">Auth · CORS</text>
  <text x="400" y="178" fill="#6e7681" font-family="sans-serif" font-size="10">Middleware</text>

  <!-- Arrow down -->
  <line x1="280" y1="190" x2="280" y2="208" stroke="#38bdf8" stroke-opacity="0.4" stroke-width="2"/>
  <polygon points="275,208 285,208 280,218" fill="#38bdf8" fill-opacity="0.4"/>

  <!-- DATABASE layer -->
  <rect x="40" y="222" width="480" height="50" rx="8" fill="#9100B0" fill-opacity="0.05" stroke="#9100B0" stroke-opacity="0.25" stroke-width="1"/>
  <text x="60" y="242" fill="#9100B0" font-family="monospace" font-size="10" font-weight="bold">DATABASE</text>
  <!-- DB icons -->
  <rect x="120" y="232" width="70" height="30" rx="5" fill="#161b22" stroke="#9100B0" stroke-opacity="0.35" stroke-width="1"/>
  <text x="155" y="247" fill="#9100B0" font-family="monospace" font-size="9" text-anchor="middle">PostgreSQL</text>
  <text x="155" y="258" fill="#6e7681" font-family="monospace" font-size="7.5" text-anchor="middle">Relational</text>

  <rect x="202" y="232" width="60" height="30" rx="5" fill="#161b22" stroke="#9100B0" stroke-opacity="0.35" stroke-width="1"/>
  <text x="232" y="247" fill="#9100B0" font-family="monospace" font-size="9" text-anchor="middle">Redis</text>
  <text x="232" y="258" fill="#6e7681" font-family="monospace" font-size="7.5" text-anchor="middle">Cache</text>

  <rect x="274" y="232" width="65" height="30" rx="5" fill="#161b22" stroke="#9100B0" stroke-opacity="0.35" stroke-width="1"/>
  <text x="306" y="247" fill="#9100B0" font-family="monospace" font-size="9" text-anchor="middle">Prisma ORM</text>
  <text x="306" y="258" fill="#6e7681" font-family="monospace" font-size="7.5" text-anchor="middle">Migrations</text>

  <text x="370" y="248" fill="#6e7681" font-family="sans-serif" font-size="9">Docker · Deploy</text>
  <text x="370" y="260" fill="#10B981" font-family="sans-serif" font-size="9">4+ Projects</text>
