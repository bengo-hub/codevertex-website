  <text x="150" y="172" fill="#6e7681" font-family="monospace" font-size="8" text-anchor="middle">Express</text>

  <rect x="197" y="142" width="80" height="38" rx="5" fill="#161b22" stroke="#38bdf8" stroke-opacity="0.35" stroke-width="1"/>
