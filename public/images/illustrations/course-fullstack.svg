  <text x="206" y="82" fill="#6e7681" font-family="monospace" font-size="8" text-anchor="middle">Tailwind</text>

  <rect x="247" y="52" width="60" height="38" rx="5" fill="#161b22" stroke="#f59e0b" stroke-opacity="0.4" stroke-width="1"/>
  <text x="277" y="70" fill="#f59e0b" font-family="monospace" font-size="9" text-anchor="middle">{'<Auth/>'}</text>
  <text x="277" y="82" fill="#6e7681" font-family="monospace" font-size="8" text-anchor="middle">JWT</text>

  <rect x="318" y="52" width="65" height="38" rx="5" fill="#161b22" stroke="#9100B0" stroke-opacity="0.4" stroke-width="1"/>
  <text x="350" y="70" fill="#9100B0" font-family="monospace" font-size="9" text-anchor="middle">{'<API/>'}</text>
  <text x="350" y="82" fill="#6e7681" font-family="monospace" font-size="8" text-anchor="middle">GraphQL</text>

  <text x="430" y="73" fill="#6e7681" font-family="sans-serif" font-size="10">Next.js · Vite</text>

