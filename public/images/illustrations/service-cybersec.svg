<svg viewBox="0 0 800 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="500" fill="#151b2a"/>

  <!-- Grid lines -->
  <g opacity="0.08" stroke="#ef4444">
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="160" y1="0" x2="160" y2="500"/>
    <line x1="320" y1="0" x2="320" y2="500"/>
    <line x1="480" y1="0" x2="480" y2="500"/>
    <line x1="640" y1="0" x2="640" y2="500"/>
  </g>

  <!-- Central shield -->
  <path d="M400 60 L520 110 L520 230 Q520 330 400 380 Q280 330 280 230 L280 110 Z"
        fill="#ef444412" stroke="#ef4444" stroke-width="2"/>
  <path d="M400 90 L500 132 L500 228 Q500 310 400 352 Q300 310 300 228 L300 132 Z"
        fill="#ef444420" stroke="#ef4444" stroke-width="1" opacity="0.6"/>

  <!-- Lock icon inside shield -->
  <rect x="375" y="200" width="50" height="38" rx="4" fill="#ef4444" opacity="0.9"/>
  <path d="M385 200 L385 188 Q385 170 400 170 Q415 170 415 188 L415 200"
        stroke="#ef4444" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <circle cx="400" cy="218" r="5" fill="white"/>
  <rect x="398" y="218" width="4" height="8" rx="2" fill="white"/>

  <!-- Orbiting dots/nodes -->
  <circle cx="400" cy="50" r="6" fill="#ef4444" opacity="0.8"/>
  <circle cx="540" cy="140" r="5" fill="#ef4444" opacity="0.6"/>
  <circle cx="540" cy="280" r="5" fill="#ef4444" opacity="0.6"/>
  <circle cx="400" cy="390" r="6" fill="#ef4444" opacity="0.8"/>
  <circle cx="260" cy="280" r="5" fill="#ef4444" opacity="0.6"/>
  <circle cx="260" cy="140" r="5" fill="#ef4444" opacity="0.6"/>

  <!-- Orbit ring -->
  <ellipse cx="400" cy="215" rx="160" ry="165" stroke="#ef4444" stroke-width="1" stroke-dasharray="8 6" opacity="0.3"/>

  <!-- Scan lines (threat detection) -->
  <rect x="130" y="140" width="110" height="70" rx="8" fill="#1a0505" stroke="#ef4444" stroke-width="1.5" opacity="0.85"/>
  <text x="185" y="163" text-anchor="middle" fill="#ef4444" font-size="9" font-family="monospace" opacity="0.9">SCAN</text>
  <line x1="143" y1="175" x2="227" y2="175" stroke="#ef4444" stroke-width="1" opacity="0.6"/>
  <line x1="143" y1="183" x2="210" y2="183" stroke="#ef4444" stroke-width="1" opacity="0.5"/>
  <line x1="143" y1="191" x2="200" y2="191" stroke="#22c55e" stroke-width="1.5" opacity="0.8"/>
  <circle cx="226" cy="191" r="3" fill="#22c55e" opacity="0.9"/>

  <!-- Alert panel right -->
  <rect x="560" y="120" width="115" height="85" rx="8" fill="#1a0505" stroke="#ef4444" stroke-width="1.5" opacity="0.85"/>
  <text x="617" y="143" text-anchor="middle" fill="#ef4444" font-size="9" font-family="monospace" opacity="0.9">ALERTS</text>
  <line x1="572" y1="152" x2="662" y2="152" stroke="#ef4444" stroke-width="0.5" opacity="0.3"/>
  <circle cx="580" cy="163" r="3" fill="#ef4444"/>
  <text x="590" y="167" fill="#ef4444" font-size="8" font-family="monospace" opacity="0.8">CVE-2024</text>
  <circle cx="580" cy="177" r="3" fill="#f59e0b"/>
  <text x="590" y="181" fill="#f59e0b" font-size="8" font-family="monospace" opacity="0.8">Port scan</text>
  <circle cx="580" cy="191" r="3" fill="#22c55e"/>
  <text x="590" y="195" fill="#22c55e" font-size="8" font-family="monospace" opacity="0.8">Patched</text>

  <!-- Network nodes bottom -->
  <circle cx="180" cy="360" r="20" fill="#1a0505" stroke="#ef4444" stroke-width="1.5" opacity="0.8"/>
  <text x="180" y="365" text-anchor="middle" fill="#ef4444" font-size="10" font-family="monospace">API</text>

  <circle cx="280" cy="420" r="18" fill="#1a0505" stroke="#f59e0b" stroke-width="1.5" opacity="0.8"/>
  <text x="280" y="425" text-anchor="middle" fill="#f59e0b" font-size="9" font-family="monospace">DB</text>

  <circle cx="520" cy="420" r="18" fill="#1a0505" stroke="#22c55e" stroke-width="1.5" opacity="0.8"/>
  <text x="520" y="425" text-anchor="middle" fill="#22c55e" font-size="8" font-family="monospace">SAFE</text>

  <circle cx="620" cy="360" r="20" fill="#1a0505" stroke="#ef4444" stroke-width="1.5" opacity="0.8"/>
  <text x="620" y="365" text-anchor="middle" fill="#ef4444" font-size="9" font-family="monospace">FW</text>

  <!-- Connection lines between nodes -->
  <line x1="200" y1="360" x2="280" y2="420" stroke="#ef4444" stroke-width="1" stroke-dasharray="4 3" opacity="0.4"/>
  <line x1="280" y1="420" x2="390" y2="380" stroke="#ef4444" stroke-width="1" stroke-dasharray="4 3" opacity="0.4"/>
  <line x1="410" y1="380" x2="520" y2="420" stroke="#22c55e" stroke-width="1" stroke-dasharray="4 3" opacity="0.5"/>
  <line x1="520" y1="420" x2="600" y2="360" stroke="#22c55e" stroke-width="1" stroke-dasharray="4 3" opacity="0.5"/>

  <!-- Glow effect around shield -->
  <circle cx="400" cy="215" r="100" fill="#ef4444" opacity="0.04"/>
</svg>
