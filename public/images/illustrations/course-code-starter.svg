<svg viewBox="0 0 560 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <radialGradient id="glow" cx="25%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#10B981" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="560" height="280" fill="url(#bg)"/>
  <rect width="560" height="280" fill="url(#glow)"/>

  <!-- Editor panel -->
  <rect x="18" y="18" width="310" height="210" rx="10" fill="#161b22" stroke="#10B981" stroke-opacity="0.25" stroke-width="1"/>
  <!-- Title bar -->
  <rect x="18" y="18" width="310" height="32" rx="10" fill="#1c2333"/>
  <rect x="18" y="38" width="310" height="12" fill="#1c2333"/>
  <circle cx="36" cy="34" r="5" fill="#ff5f57"/>
  <circle cx="54" cy="34" r="5" fill="#ffbd2e"/>
  <circle cx="72" cy="34" r="5" fill="#28c940"/>
  <text x="95" y="38" fill="#6e7681" font-family="monospace" font-size="10" font-weight="bold">main.py</text>
  <text x="210" y="38" fill="#6e7681" font-family="monospace" font-size="10">index.js</text>

  <!-- Python code -->
  <text x="30" y="72" fill="#c792ea" font-family="monospace" font-size="10.5">def</text>
  <text x="56" y="72" fill="#82aaff" font-family="monospace" font-size="10.5">build_app</text>
  <text x="138" y="72" fill="#cdd9e5" font-family="monospace" font-size="10.5">(name):</text>
  <text x="30" y="90" fill="#cdd9e5" font-family="monospace" font-size="10.5">  return</text>
  <text x="90" y="90" fill="#f78c6c" font-family="monospace" font-size="10.5">f"Hello {name}!"</text>
  <text x="30" y="108" fill="#637777" font-family="monospace" font-size="10.5"># Build something real</text>

  <text x="30" y="128" fill="#c792ea" font-family="monospace" font-size="10.5">for</text>
  <text x="52" y="128" fill="#cdd9e5" font-family="monospace" font-size="10.5">week in</text>
  <text x="105" y="128" fill="#82aaff" font-family="monospace" font-size="10.5">range</text>
  <text x="148" y="128" fill="#cdd9e5" font-family="monospace" font-size="10.5">(1, 11):</text>
  <text x="30" y="146" fill="#cdd9e5" font-family="monospace" font-size="10.5">  print(</text>
  <text x="88" y="146" fill="#82aaff" font-family="monospace" font-size="10.5">build_app</text>
  <text x="158" y="146" fill="#f78c6c" font-family="monospace" font-size="10.5">"Dev"</text>
  <text x="197" y="146" fill="#cdd9e5" font-family="monospace" font-size="10.5">))</text>

  <!-- JS line -->
  <text x="30" y="166" fill="#c792ea" font-family="monospace" font-size="10.5">const</text>
  <text x="68" y="166" fill="#82aaff" font-family="monospace" font-size="10.5">fetch</text>
  <text x="103" y="166" fill="#cdd9e5" font-family="monospace" font-size="10.5">= async () =&gt; {'{'}</text>
  <text x="30" y="184" fill="#cdd9e5" font-family="monospace" font-size="10.5">  const res =</text>
  <text x="118" y="184" fill="#c792ea" font-family="monospace" font-size="10.5">await</text>
  <text x="157" y="184" fill="#10B981" font-family="monospace" font-size="10.5">getData()</text>
  <text x="30" y="200" fill="#637777" font-family="monospace" font-size="10.5">{'}'} // deploy to GitHub</text>

  <!-- Terminal strip -->
  <rect x="18" y="238" width="310" height="42" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="30" y="254" fill="#10B981" font-family="monospace" font-size="10">$ git push origin main</text>
  <text x="30" y="270" fill="#3fb950" font-family="monospace" font-size="10">✓ Deployed to GitHub Pages</text>

  <!-- Right panel: skills + git branch -->
  <rect x="346" y="18" width="196" height="262" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="365" y="45" fill="#8b949e" font-family="sans-serif" font-size="10" font-weight="bold" letter-spacing="1">SKILLS YOU EARN</text>

  <!-- Skill badges -->
  <rect x="360" y="55" width="52" height="20" rx="10" fill="#10B981" fill-opacity="0.15" stroke="#10B981" stroke-opacity="0.4" stroke-width="1"/>
  <text x="386" y="69" fill="#10B981" font-family="sans-serif" font-size="9.5" text-anchor="middle" font-weight="bold">Python</text>

  <rect x="420" y="55" width="68" height="20" rx="10" fill="#f59e0b" fill-opacity="0.15" stroke="#f59e0b" stroke-opacity="0.4" stroke-width="1"/>
  <text x="454" y="69" fill="#f59e0b" font-family="sans-serif" font-size="9.5" text-anchor="middle" font-weight="bold">JavaScript</text>

  <rect x="360" y="82" width="42" height="20" rx="10" fill="#38bdf8" fill-opacity="0.15" stroke="#38bdf8" stroke-opacity="0.4" stroke-width="1"/>
  <text x="381" y="96" fill="#38bdf8" font-family="sans-serif" font-size="9.5" text-anchor="middle" font-weight="bold">HTML</text>

  <rect x="410" y="82" width="36" height="20" rx="10" fill="#ec4899" fill-opacity="0.15" stroke="#ec4899" stroke-opacity="0.4" stroke-width="1"/>
  <text x="428" y="96" fill="#ec4899" font-family="sans-serif" font-size="9.5" text-anchor="middle" font-weight="bold">CSS</text>

  <rect x="453" y="82" width="36" height="20" rx="10" fill="#8b5cf6" fill-opacity="0.15" stroke="#8b5cf6" stroke-opacity="0.4" stroke-width="1"/>
  <text x="471" y="96" fill="#8b5cf6" font-family="sans-serif" font-size="9.5" text-anchor="middle" font-weight="bold">Git</text>

  <rect x="360" y="109" width="58" height="20" rx="10" fill="#6b7280" fill-opacity="0.15" stroke="#6b7280" stroke-opacity="0.4" stroke-width="1"/>
  <text x="389" y="123" fill="#9ca3af" font-family="sans-serif" font-size="9.5" text-anchor="middle" font-weight="bold">Linux CLI</text>

  <rect x="425" y="109" width="64" height="20" rx="10" fill="#6366f1" fill-opacity="0.15" stroke="#6366f1" stroke-opacity="0.4" stroke-width="1"/>
  <text x="457" y="123" fill="#6366f1" font-family="sans-serif" font-size="9.5" text-anchor="middle" font-weight="bold">AI Tools</text>

  <line x1="360" y1="140" x2="528" y2="140" stroke="#30363d" stroke-width="1"/>

  <!-- Stats -->
  <text x="365" y="158" fill="#8b949e" font-family="sans-serif" font-size="9">DURATION</text>
  <text x="365" y="174" fill="#e6edf3" font-family="sans-serif" font-size="15" font-weight="bold">10 Weeks</text>

  <text x="440" y="158" fill="#8b949e" font-family="sans-serif" font-size="9">CERTS</text>
  <text x="440" y="174" fill="#10B981" font-family="sans-serif" font-size="15" font-weight="bold">2 ICDL</text>

  <line x1="360" y1="186" x2="528" y2="186" stroke="#30363d" stroke-width="1"/>

  <!-- Git branch visualization -->
  <text x="365" y="202" fill="#8b949e" font-family="sans-serif" font-size="9">GIT WORKFLOW</text>
  <circle cx="372" cy="222" r="5" fill="#10B981"/>
  <circle cx="404" cy="222" r="5" fill="#10B981"/>
  <circle cx="436" cy="222" r="5" fill="#10B981"/>
  <circle cx="468" cy="210" r="4" fill="#8b5cf6"/>
  <circle cx="500" cy="222" r="5" fill="#10B981" opacity="0.9"/>
  <line x1="372" y1="222" x2="500" y2="222" stroke="#10B981" stroke-opacity="0.5" stroke-width="2"/>
  <line x1="436" y1="222" x2="468" y2="210" stroke="#8b5cf6" stroke-opacity="0.6" stroke-width="1.5"/>
  <line x1="468" y1="210" x2="500" y2="222" stroke="#8b5cf6" stroke-opacity="0.6" stroke-width="1.5"/>
  <text x="364" y="240" fill="#8b949e" font-family="monospace" font-size="8">main</text>
  <text x="450" y="205" fill="#8b5cf6" font-family="monospace" font-size="8">feat</text>

  <!-- Projects count -->
  <text x="365" y="265" fill="#8b949e" font-family="sans-serif" font-size="9">3+ REAL PROJECTS BUILT &amp; DEPLOYED</text>
</svg>
