<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 210" width="860" height="210">
  <defs>
    <style>
      .wordmark {
        font-family: 'Arial Black', 'Franklin Gothic Heavy', 'Impact', 'Helvetica Neue', Arial, sans-serif;
        font-weight: 900;
        font-size: 128px;
        fill: #1a1a1a;
        letter-spacing: -3px;
      }
      .tagline {
        font-family: 'Arial', 'Helvetica Neue', Arial, sans-serif;
        font-weight: 700;
        font-size: 24px;
        fill: #1a1a1a;
        letter-spacing: 4px;
      }
    </style>
  </defs>

  <!-- "Code" — left wordmark segment -->
  <text class="wordmark" x="8" y="148">Code</text>

  <!-- Circle (the stylised V replacement) — purple/maroon brand colour -->
  <circle cx="438" cy="88" r="78" stroke="#722F5F" stroke-width="9" fill="white"/>

  <!-- Checkmark inside circle -->
  <polyline
    points="403,90 428,118 478,56"
    stroke="#722F5F"
    stroke-width="9"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />

  <!-- "ertex" — right wordmark segment -->
  <text class="wordmark" x="507" y="148">ertex</text>

  <!-- "AFRICA" left tagline (mirrors "IT" position in original) -->
  <text class="tagline" x="340" y="187" text-anchor="end">AFRICA</text>

  <!-- "LIMITED" right tagline (mirrors "SOLUTIONS" position in original) -->
  <text class="tagline" x="540" y="187" text-anchor="start">LIMITED</text>
</svg>
